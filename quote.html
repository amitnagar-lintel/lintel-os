<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Your Quotation · Lintel Space Atelier</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0D0D27">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0D0D27; --navy2:#1A1A40; --gold:#D4A85C; --gold-l:#E9C06B; --ink:#23233F; --paper:#fff; --line:#E0DCD4; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:#F3F1EC; color:var(--ink);
    font-family:'Jost',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-text-size-adjust:100%;            /* stop iOS inflating the sheet's text */
  }

  /* ── top bar ─────────────────────────────────────────────────────────── */
  .top{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
    color:#F7F2E9; padding:14px 18px calc(14px + env(safe-area-inset-bottom,0));
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    position:sticky; top:0; z-index:20;
  }
  .brand{font-family:'Cormorant Garamond',Georgia,serif; font-size:19px; font-weight:600; letter-spacing:.3px}
  .brand small{display:block;font-family:'Jost';font-size:9px;letter-spacing:2.4px;text-transform:uppercase;opacity:.6;font-weight:400}
  .top .sp{flex:1}
  .btn{
    appearance:none; border:1px solid rgba(212,168,92,.55); background:transparent; color:var(--gold-l);
    font:500 12px 'Jost'; letter-spacing:1px; text-transform:uppercase;
    padding:9px 15px; border-radius:8px; cursor:pointer; white-space:nowrap; min-height:40px;
  }
  .btn:active{background:rgba(212,168,92,.16)}

  /* ── sheet frame ─────────────────────────────────────────────────────── */
  .wrap{max-width:900px;margin:18px auto 40px;padding:0 14px}
  .card{background:var(--paper);border-radius:12px;overflow:hidden;box-shadow:0 18px 50px -24px rgba(13,13,39,.45)}
  .state{padding:56px 24px;text-align:center;color:#6b6b7a}
  .state h2{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--navy);margin:0 0 8px}
  .spin{width:26px;height:26px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;margin:0 auto 16px;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .foot{text-align:center;font-size:11.5px;color:#8a8a99;padding:18px 14px 0;line-height:1.7}
  .foot a{color:#6b6b7a}

  /* ── the injected client sheet ───────────────────────────────────────────
     The snapshot is built for A4 print, so everything below re-flows it for a
     phone without touching the sent content. */
  #sheet{width:100%}
  #sheet img{max-width:100%;height:auto}
  #sheet table{width:100%!important;border-collapse:collapse;font-size:13px}
  /* Only genuinely wide tables (the item schedule) get their own scroller.
     Narrow summary tables must stay full-width so the totals remain visible. */
  .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .tscroll table.wide{min-width:560px}

  @media (max-width:640px){
    .wrap{padding:0 8px;margin-top:10px}
    .card{border-radius:10px}
    #sheet{font-size:13px}
    #sheet table{font-size:12px}
    /* the sheet's inline paddings are generous for A4 — tighten them on phones */
    #sheet > div{padding-left:14px!important;padding-right:14px!important}
    #sheet td,#sheet th{padding:6px 8px!important}
    .brand{font-size:17px}
  }

  /* Client saves their own PDF from here. */
  @media print{
    .top,.foot,.noprint{display:none!important}
    body{background:#fff}
    .wrap{margin:0;padding:0;max-width:none}
    .card{box-shadow:none;border-radius:0}
    .tscroll{overflow:visible!important}
    .tscroll table{min-width:0!important}
    @page{margin:8mm;size:A4 portrait}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  }
</style>
</head>
<body>

<div class="top">
  <div class="brand">Lintel Space Atelier<small>Interiors of Distinction</small></div>
  <div class="sp"></div>
  <button class="btn noprint" id="printBtn" style="display:none">⬇ Save as PDF</button>
</div>

<div class="wrap">
  <div class="card">
    <div id="sheet"></div>
    <div class="state" id="state"><div class="spin"></div>Loading your quotation…</div>
  </div>
  <div class="foot">
    Questions? Reply to the email or write to <a href="mailto:contact@lintelspace.com">contact@lintelspace.com</a>.<br>
    © Lintel Space Atelier · www.lintelspace.com
  </div>
</div>

<script>
(function(){
  var FN = "https://cxgxmqspvpuizvwfbnjq.supabase.co/functions/v1/quote-view";
  var stateEl = document.getElementById("state");
  var sheetEl = document.getElementById("sheet");
  var printBtn = document.getElementById("printBtn");

  function fail(title, msg){
    sheetEl.innerHTML = "";
    stateEl.innerHTML = "<h2>" + title + "</h2>" + msg;
  }

  var token = new URLSearchParams(location.search).get("t");
  if(!token){ return fail("Link incomplete", "This quotation link looks incomplete. Please use the link from your email."); }

  fetch(FN + "?t=" + encodeURIComponent(token), { headers:{ "Accept":"application/json" } })
    .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
    .then(function(res){
      if(!res.ok || !res.j || res.j.error || !res.j.html){
        var e = (res.j && res.j.error) || "This quotation link is no longer valid.";
        return fail("Quotation unavailable", e + "<br><br>Please contact your design consultant for an up-to-date copy.");
      }
      stateEl.style.display = "none";
      sheetEl.innerHTML = res.j.html;

      // The item schedule has too many columns to squeeze onto a phone, so it
      // scrolls on its own rather than forcing the whole page sideways. Narrow
      // summary tables are left alone — their totals must stay on screen.
      Array.prototype.forEach.call(sheetEl.querySelectorAll("table"), function(t){
        if(t.closest(".tscroll")) return;
        var cols = 0;
        Array.prototype.forEach.call(t.rows, function(r){
          var n = 0;
          Array.prototype.forEach.call(r.cells, function(c){ n += (c.colSpan || 1); });
          if(n > cols) cols = n;
        });
        if(cols < 5) return;                 // summary tables render full-width
        t.classList.add("wide");
        var w = document.createElement("div");
        w.className = "tscroll";
        t.parentNode.insertBefore(w, t);
        w.appendChild(t);
      });

      if(res.j.title) document.title = res.j.title + " · Lintel Space Atelier";
      printBtn.style.display = "";
    })
    .catch(function(){
      fail("Could not load the quotation", "Please check your connection and try again.");
    });

  printBtn.onclick = function(){ window.print(); };
})();
</script>
</body>
</html>
