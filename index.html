}

/* ---- Live-call-friendly MoM entry: big notes box, Enter-to-add action rows,
        draft auto-saved to localStorage so a dropped call loses nothing ---- */
function momForm(entityType, entity, m, body, existingActions){
  m=m||{};
  const idCol = entityType==="project" ? "project_id" : "lead_id";
  const draftKey = "mom_draft_"+entityType+"_"+entity.id+(m.id?"_"+m.id:"_new");
  const clientLabel = entityType==="project" ? (entity.client_name||entity.name||"Client") : (entity.name||"Client");
  const now=new Date();
  const defaultTitle = m.title || (clientLabel+" — "+now.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}));

  const meetSelPromise=(async()=>{
    const {data:meets}=await sb.from("design_meetings").select("id,title").eq(idCol,entity.id).order("scheduled_at",{ascending:false});
    return `<option value="">— standalone (no linked meeting) —</option>`+(meets||[]).map(x=>`<option value="${x.id}" ${m.meeting_id===x.id?"selected":""}>${esc(x.title)}</option>`).join("");
  })();

  const actRow=(a)=>{a=a||{};return `<div class="mom-action-edit" data-arow>
    <input class="ai_item" placeholder="Action item — press Enter for a new line" value="${esc(a.item||"")}">
    <select class="ai_who"><option value="">Owner (staff)</option>${staffOpts(a.assignee_id)}</select>
    <input class="ai_who_text" placeholder="or type a name" value="${esc(a.assignee_text||'')}" style="width:110px">
    <input class="ai_due" type="date" value="${a.deadline||""}">
    <button class="linkbtn del" onclick="this.parentElement.remove()">✕</button>
  </div>`;};

  let draft=null;
  if(!m.id){ try{ const raw=localStorage.getItem(draftKey); if(raw) draft=JSON.parse(raw); }catch(e){} }

  meetSelPromise.then(opts=>{
    const acts=existingActions&&existingActions.length?existingActions:(draft&&draft.acts?draft.acts:[]);
    openModal(`
      <div class="modal-h">${m.id?"Edit minutes":"📝 Record minutes"} ${draft?'<span style="font-size:11px;color:var(--brass-deep);font-weight:400">· draft restored</span>':''}</div>
      <div class="modal-b">
        <div class="grid2">
          <div class="field"><label>Title</label><input id="mm_title" value="${esc((draft&&draft.title)||defaultTitle)}"></div>
          <div class="field"><label>Attendees</label><input id="mm_att" placeholder="e.g. Client, Amit, Rachel" value="${esc((draft&&draft.attendees)||m.attendees||"")}"></div>
        </div>
        <div class="field"><label>Linked meeting (optional)</label><select id="mm_meet">${opts}</select></div>
        <div class="field">
          <label>Discussion notes — jot down as the call happens</label>
          <textarea id="mm_sum" rows="8" placeholder="Key points, decisions, client preferences, concerns raised…" style="font-size:14px;line-height:1.6">${esc((draft&&draft.summary)||m.summary||"")}</textarea>
        </div>
        <div class="sec-label">Action items — who does what, by when</div>
        <div id="mm_actions">${acts.map(a=>actRow(a)).join("")||actRow({})}</div>
        <button class="ghost" id="mm_addrow" style="margin-top:6px">+ Add action item</button>
        <div id="mm_draftnote" style="font-size:11px;color:var(--ink-soft);margin-top:10px"></div>
      </div>
      <div class="modal-f"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" id="mm_save">Save minutes</button></div>`);

    const bindEnterAdd=()=>{
      document.querySelectorAll("#mm_actions .ai_item").forEach(inp=>{
        inp.onkeydown=(e)=>{
          if(e.key==="Enter"){
            e.preventDefault();
            const rows=document.querySelectorAll("#mm_actions [data-arow]");
            if(inp===rows[rows.length-1].querySelector(".ai_item")){
              $("#mm_actions").insertAdjacentHTML("beforeend",actRow({}));
              bindEnterAdd();
              document.querySelectorAll("#mm_actions .ai_item")[rows.length].focus();
            }
          }
        };
      });
    };
    bindEnterAdd();
    $("#mm_addrow").onclick=()=>{ $("#mm_actions").insertAdjacentHTML("beforeend",actRow({})); bindEnterAdd(); };

    let draftTimer=null;
    if(!m.id){
      const saveDraft=()=>{
        try{
          const rows=Array.from(document.querySelectorAll("#mm_actions [data-arow]")).map(r=>({
            item:r.querySelector(".ai_item").value, assignee_id:r.querySelector(".ai_who").value?Number(r.querySelector(".ai_who").value):null,
            assignee_text:r.querySelector(".ai_who_text").value, deadline:r.querySelector(".ai_due").value
          }));
          localStorage.setItem(draftKey,JSON.stringify({title:$("#mm_title").value,attendees:$("#mm_att").value,summary:$("#mm_sum").value,acts:rows,savedAt:Date.now()}));
          const note=$("#mm_draftnote"); if(note) note.textContent="Draft auto-saved "+new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
        }catch(e){}
      };
      draftTimer=setInterval(saveDraft,4000);
      if(draft) saveDraft();
    }

    $("#mm_save").onclick=async()=>{
      const payload={ [idCol]:entity.id, title:$("#mm_title").value.trim()||defaultTitle,
        attendees:$("#mm_att").value.trim()||null,
        meeting_id:$("#mm_meet").value?Number($("#mm_meet").value):null, summary:$("#mm_sum").value.trim()||null };
      let momId=m.id;
      if(momId){ await sb.from("design_moms").update(payload).eq("id",momId); await sb.from("mom_actions").delete().eq("mom_id",momId); }
      else { const {data,error}=await sb.from("design_moms").insert(payload).select().single(); if(error) return toast(error.message); momId=data.id; }
      const rows=Array.from(document.querySelectorAll("#mm_actions [data-arow]"));
      const inserts=rows.map(r=>({
        mom_id:momId, [idCol]:entity.id,
        item:r.querySelector(".ai_item").value.trim(),
        assignee_id:r.querySelector(".ai_who").value?Number(r.querySelector(".ai_who").value):null,
        assignee_text:r.querySelector(".ai_who_text").value.trim()||null,
        deadline:r.querySelector(".ai_due").value||null
      })).filter(x=>x.item);
      if(inserts.length) await sb.from("mom_actions").insert(inserts);
      if(draftTimer) clearInterval(draftTimer);
      try{ localStorage.removeItem(draftKey); }catch(e){}
      if(entityType==="lead") await sb.from("lead_activities").insert({lead_id:entity.id,type:"Note",text:"MoM recorded: "+payload.title,by_user:me.id});
      closeModal(); toast("Minutes saved");
      if(entityType==="project"){ designSub="mom"; dsMoM(entity,body); } else { renderMoM("lead",entity,body); }
    };
  });
}

/* ---- Export a saved MoM: PDF (print), WhatsApp, or Email ---- */
function momExport(entityType, entity, momId, moms, actions, mode){
  const m=(moms||[]).find(x=>String(x.id)===String(momId));
  if(!m) return;
  const acts=(actions||[]).filter(a=>a.mom_id===m.id);
  const dateStr=new Date(m.created_at).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
  const who=a=>a.assignee_id?staffName(a.assignee_id):(a.assignee_text||"");
  const clientPhone = entityType==="project" ? entity.client_phone : entity.phone;
  const clientEmail = entityType==="project" ? entity.client_email : entity.email;
  const refLabel = entityType==="project" ? (entity.code||entity.name) : entity.name;

  if(mode==="pdf"){
    const doc=`<div style="font-family:'Times New Roman',serif;max-width:720px;margin:0 auto;color:#1a1a1a">
      <div style="background:#0D0D27;color:#fff;padding:22px 30px">
        <div style="font-size:12px;letter-spacing:3px;color:#DFB05E">LINTEL SPACE ATELIER</div>
        <div style="font-size:19px;margin-top:8px">${esc(m.title||"Minutes of Meeting")}</div>
        <div style="font-size:12px;color:#9CA0B0;margin-top:6px">${dateStr}${refLabel?" · "+esc(refLabel):""}${m.attendees?" · Attendees: "+esc(m.attendees):""}</div>
      </div>
      <div style="padding:24px 30px">
        ${m.summary?`<div style="font-size:11px;color:#8A8FA3;text-transform:uppercase;margin-bottom:6px">Discussion</div><div style="font-size:14px;line-height:1.8;white-space:pre-wrap;margin-bottom:22px">${esc(m.summary)}</div>`:''}
        ${acts.length?`<div style="font-size:11px;color:#8A8FA3;text-transform:uppercase;margin-bottom:10px">Action Items</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:#F6F4EF;text-align:left"><th style="padding:8px 10px">Item</th><th style="padding:8px 10px">Owner</th><th style="padding:8px 10px">Due</th></tr></thead>
          <tbody>${acts.map(a=>`<tr style="border-bottom:1px solid #ECECEC"><td style="padding:8px 10px">${esc(a.item)}</td><td style="padding:8px 10px">${esc(who(a))}</td><td style="padding:8px 10px">${a.deadline||''}</td></tr>`).join("")}</tbody>
        </table>`:''}
        <div style="margin-top:26px;padding-top:12px;border-top:1px solid #ECECEC;font-size:11px;color:#999">Lintel Space Atelier · Where luxury meets functionality</div>
      </div></div>`;
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>${esc(m.title||'MoM')}</title></head><body style="margin:0">${doc}</body></html>`);
    w.document.close(); setTimeout(()=>w.print(),300);
    return;
  }

  if(mode==="wa"){
    let msg=`*${m.title||'Minutes of Meeting'}*\n${dateStr}${m.attendees?`\nAttendees: ${m.attendees}`:''}\n\n`;
    if(m.summary) msg+=m.summary+"\n\n";
    if(acts.length){ msg+="*Action items:*\n"; acts.forEach(a=>{ msg+=`• ${a.item}${who(a)?` — ${who(a)}`:''}${a.deadline?` (by ${a.deadline})`:''}\n`; }); }
    msg+="\n— Team Lintel";
    if(clientPhone){ waOpen(clientPhone,msg); }
    else { window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank"); }
    return;
  }

  if(mode==="email"){
    const subject=`Minutes of Meeting — ${m.title||dateStr}`;
    let bodyTxt=`${m.title||'Minutes of Meeting'}\n${dateStr}${m.attendees?`\nAttendees: ${m.attendees}`:''}\n\n`;
    if(m.summary) bodyTxt+=m.summary+"\n\n";
    if(acts.length){ bodyTxt+="Action items:\n"; acts.forEach(a=>{ bodyTxt+=`- ${a.item}${who(a)?` — ${who(a)}`:''}${a.deadline?` (by ${a.deadline})`:''}\n`; }); }
    bodyTxt+="\n— Team Lintel";
    location.href=`mailto:${encodeURIComponent(clientEmail||"")}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyTxt)}`;
    return;
  }
}

function exStatus(a){
  const today=todayISO();
  const done = a.percent_complete>=100 || !!a.actual_finish;
  if(done){
    const late = a.actual_finish && a.planned_finish && a.actual_finish>a.planned_finish;
    return late?"late":"done"; // finished but late still flags late
  }
  if(a.planned_finish && a.planned_finish<today) return "late";   // overdue, not done
  if(a.actual_start || a.percent_complete>0) return "in_progress";
  return "todo";
}
function exStatusLabel(s){ return s==="in_progress"?"In progress":s==="late"?"Delayed":s.charAt(0).toUpperCase()+s.slice(1); }

/* ---- Slice 1: BOQ-driven schedule (trade-level, dated off KOM) ---- */
const SCHED={trades:null,map:null,defaults:null,taskTpl:null,phases:null};
function schedNorm(s){ return (s||"").toLowerCase().replace(/\s+/g," ").trim(); }
function schedAddDays(iso,n){ const d=new Date(iso+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
// 6-day work week (sensible default): Sundays are non-working. Durations are working days.
function schedIsSunday(iso){ return new Date(iso+"T00:00:00Z").getUTCDay()===0; }
function schedNextWorkday(iso){ let d=iso; while(schedIsSunday(d)) d=schedAddDays(d,1); return d; }
function schedAddWorkdays(iso,n){ let d=iso; while(n>0){ d=schedAddDays(d,1); if(!schedIsSunday(d)) n--; } return d; }
// classify a free-text room name into a room type (drives the default civil/MEP spine)
function schedClassifyRoom(name){
  const s=(name||"").toLowerCase();
  if(/pooja|puja|mandir|prayer/.test(s)) return 'pooja';
  if(/bath|toilet|washroom|\bwc\b|powder|restroom|ensuite|en-suite/.test(s)) return 'bathroom';
  if(/kitchen|kws|pantry/.test(s)) return 'kitchen';
  if(/balcon|deck|terrace|utility|wash area|servant|dry area/.test(s)) return 'balcony';
  if(/foyer|entrance|entry|lobby|passage|corridor|hallway/.test(s)) return 'foyer';
  if(/study|home office|\boffice\b|library/.test(s)) return 'study';
  if(/dining/.test(s)) return 'dining';
  if(/living|hall|drawing|lounge|family/.test(s)) return 'living';
  if(/bed|mbr|\bguest\b|kids|children|master/.test(s)) return 'bedroom';
  return 'general';
}
function schedTitle(s){ return (s||"").toLowerCase().replace(/\s+/g," ").trim().replace(/(^|\s)\w/g,c=>c.toUpperCase()); }
// prep / whole-house line items that are not real construction rooms
function schedIsNonRoom(key){ return /deep clean|floor protect|floor protector/.test(key); }
async function schedLoadMaster(){
  if(SCHED.trades&&SCHED.trades.length&&SCHED.map&&SCHED.defaults&&SCHED.taskTpl&&SCHED.phases) return;
  const {data:tr,error:e1}=await sb.from("trade_master").select("code,name,exp_tat_days,seq,scope_group").order("seq").order("id");
  const {data:mp,error:e2}=await sb.from("boq_category_trade_map").select("category_norm,trade_code");
  const {data:rd,error:e3}=await sb.from("room_type_trade_default").select("room_type,trade_code");
  const {data:tt,error:e4}=await sb.from("trade_task_template").select("trade_code,task_name,seq,duration_days").order("seq").order("id");
  const {data:ph,error:e5}=await sb.from("project_phase_template").select("kind,task_name,trade_label,seq,duration_days,anchor").order("seq").order("id");
  if(e1||e2||e3||e4||e5){ toast("Could not load schedule master data"); return; }
  SCHED.trades=(tr||[]).map(t=>({code:t.code,name:t.name,exp_tat_days:Number(t.exp_tat_days)||1,seq:Number(t.seq)||0,scope_group:t.scope_group||'other'}));
  const map={}; (mp||[]).forEach(m=>{ (map[m.category_norm]=map[m.category_norm]||[]).push(m.trade_code); });
  SCHED.map=map;
  const def={}; (rd||[]).forEach(r=>{ (def[r.room_type]=def[r.room_type]||[]).push(r.trade_code); });
  SCHED.defaults=def;
  const tpl={}; (tt||[]).forEach(x=>{ (tpl[x.trade_code]=tpl[x.trade_code]||[]).push({name:x.task_name,seq:Number(x.seq)||0,dur:Number(x.duration_days)||1}); });
  Object.values(tpl).forEach(a=>a.sort((x,y)=>x.seq-y.seq)); SCHED.taskTpl=tpl;
  SCHED.phases=(ph||[]).map(x=>({kind:x.kind,task_name:x.task_name,trade_label:x.trade_label,seq:Number(x.seq)||0,dur:Number(x.duration_days)||1,anchor:x.anchor}));
}
// latest included BOQ items for a project; returns {items} or {error}
async function schedBoqItems(p){
  const {data:vers,error:vErr}=await sb.from("boq_versions").select("id").eq("project_id",p.id).order("version",{ascending:false}).order("id",{ascending:false}).limit(1);
  if(vErr) return {error:vErr.message};
  if(!vers||!vers.length) return {error:"No BOQ on this project yet — build one first."};
  const {data:items,error:iErr}=await sb.from("boq_items").select("room,room_tag,category,scope").eq("boq_version_id",vers[0].id).order("id");
  if(iErr) return {error:iErr.message};
  const inScope=(items||[]).filter(i=>i.scope!=='excluded'&&i.scope!=='optional');
  if(!inScope.length) return {error:"The BOQ has no included line items."};
  return {items:inScope};
}
// build the full task-level schedule. Modular (KWS) splits into factory PRODUCTION
// (triggered at JIT) and on-site INSTALLATION (after PIV); everything else is site work.
async function schedCompute(p, komISO, opts){
  const withSpine=!!(opts&&opts.spine);                             // civil/MEP spine is opt-in (full-reno only)
  const bo=await schedBoqItems(p); if(bo.error) return bo;
  await schedLoadMaster();
  if(!SCHED.trades||!SCHED.trades.length||!SCHED.phases) return {error:"Schedule master data unavailable — try again."};
  const tradeByCode={}; SCHED.trades.forEach(t=>tradeByCode[t.code]=t);
  const FULLHOUSE="Full House";
  const tasks=[], unmapped=new Set(); let seq=0;
  const push=o=>tasks.push(Object.assign({room_seq:0,room_type:null,trade_code:null,source:'boq',kind:'trade',seq:seq++},o));
  const maxD=(arr,fb)=>arr.length?arr.reduce((m,d)=>d>m?d:m,arr[0]):fb;
  const expand=tr=>{ const tpl=SCHED.taskTpl[tr.code]; return (tpl&&tpl.length)?tpl:[{name:tr.name,dur:tr.exp_tat_days}]; };
  // schedule a trade's tasks sequentially from a cursor; returns the finish date
  const runTrade=(startCur, tr, ctx)=>{ let rc=startCur, last=startCur;
    expand(tr).forEach(tk=>{ const s=schedNextWorkday(rc), f=schedAddWorkdays(s,Math.max(1,tk.dur)-1);
      push(Object.assign({trade_code:tr.code,trade_name:tr.name,task_name:tk.name,kind:'trade',tat_days:tk.dur,planned_start:s,planned_finish:f},ctx));
      rc=schedAddDays(f,1); last=f; }); return last; };
  const phase=(pred)=>SCHED.phases.find(pred);
  const marker=(x,anchorDate,rseq,kind)=>{ const s=schedNextWorkday(schedAddDays(anchorDate,1)), f=schedAddWorkdays(s,Math.max(1,x.dur)-1);
    push({room:FULLHOUSE,room_seq:rseq,trade_name:x.trade_label,task_name:x.task_name,kind:kind||'milestone',tat_days:x.dur,planned_start:s,planned_finish:f}); return f; };

  // group BOQ by normalized room (merges "Kitchen"/"KITCHEN")
  const roomOrder=[], roomCats={}, roomLabel={};
  bo.items.forEach(i=>{ const raw=((i.room||i.room_tag||"General").trim())||"General"; const key=schedNorm(raw);
    if(!roomCats[key]){ roomCats[key]=new Set(); roomLabel[key]=schedTitle(raw); roomOrder.push(key); }
    const c=schedNorm(i.category); if(c) roomCats[key].add(c); });

  // 1) KICK-OFF phases (Full House, sequential from KOM)
  let cursor=schedNextWorkday(komISO);
  SCHED.phases.filter(x=>x.kind==='kickoff').forEach(x=>{
    const start=schedNextWorkday(cursor), finish=schedAddWorkdays(start,Math.max(1,x.dur)-1);
    push({room:FULLHOUSE,room_seq:-1,trade_name:x.trade_label,task_name:x.task_name,kind:'kickoff',tat_days:x.dur,planned_start:start,planned_finish:finish});
    cursor=schedAddDays(finish,1);
  });
  const roomStart=schedNextWorkday(cursor);

  // 2) SITE work per room (non-modular trades) from roomStart, rooms in parallel.
  //    Modular (KWS) trades are stashed — they install later, after production + PIV.
  let ri=0, siteEnd=roomStart; const servicesEnds=[]; const roomsMod=[];
  roomOrder.forEach(key=>{
    const boqCodes=new Set();
    roomCats[key].forEach(cn=>{ const hits=SCHED.map[cn]; if(hits&&hits.length) hits.forEach(tc=>boqCodes.add(tc)); else unmapped.add(cn); });
    if(!boqCodes.size || schedIsNonRoom(key)) return;
    const rt=schedClassifyRoom(roomLabel[key]);
    let codes;
    if(withSpine){ const spine=SCHED.defaults[rt]||SCHED.defaults['general']||[]; codes=new Set([...boqCodes,...spine]); }
    else codes=new Set(boqCodes);
    const ordered=[...codes].map(tc=>tradeByCode[tc]).filter(Boolean).sort((a,b)=>a.seq-b.seq);
    const site=ordered.filter(t=>t.scope_group!=='modular'), mod=ordered.filter(t=>t.scope_group==='modular');
    let rc=roomStart;
    site.forEach(tr=>{ const f=runTrade(rc,tr,{room:roomLabel[key],room_seq:ri,room_type:rt,source:(boqCodes.has(tr.code)?'boq':'spine')});
      rc=schedAddDays(f,1); if(tr.scope_group==='services') servicesEnds.push(f); if(f>siteEnd) siteEnd=f; });
    if(mod.length) roomsMod.push({room:roomLabel[key],room_seq:ri,rt,mod,boqCodes});
    ri++;
  });
  const hasMod=roomsMod.length>0;
  const servicesEnd=maxD(servicesEnds, roomStart);

  // 3) MODULAR flow (only if there are KWS units): JIT -> Production -> PIV -> Installation
  let installEnd=siteEnd, productionEnd=null;
  if(hasMod){
    const jit=phase(x=>x.kind==='milestone'&&x.task_name==='JIT Trigger');
    const jitEnd=jit?marker(jit,servicesEnd,9980):servicesEnd;
    const prod=phase(x=>x.kind==='production');
    productionEnd=prod?marker(prod,jitEnd,9981,'production'):jitEnd;
    const piv=phase(x=>x.kind==='milestone'&&x.task_name==='PIV');
    const pivAnchor=(productionEnd>siteEnd?productionEnd:siteEnd);
    const pivEnd=piv?marker(piv,pivAnchor,9982):pivAnchor;
    // per-room KWS installation, rooms in parallel, after PIV
    installEnd=pivEnd;
    roomsMod.forEach(rm=>{ let rc=schedNextWorkday(schedAddDays(pivEnd,1));
      rm.mod.forEach(tr=>{ const f=runTrade(rc,tr,{room:rm.room,room_seq:rm.room_seq,room_type:rm.rt,source:(rm.boqCodes.has(tr.code)?'boq':'spine')});
        rc=schedAddDays(f,1); if(f>installEnd) installEnd=f; }); });
  }

  // 4) PAYMENTS + remaining milestones
  const projEnd=maxD([siteEnd,installEnd],siteEnd); let msEnd=projEnd;
  const p1=phase(x=>x.kind==='milestone'&&x.task_name==='Services 100% Payment'); if(p1) msEnd=maxD([msEnd,marker(p1,servicesEnd,9983)],msEnd);
  const p2=phase(x=>x.kind==='milestone'&&x.task_name==='KWS 100% Payment'); if(p2&&hasMod) msEnd=maxD([msEnd,marker(p2,productionEnd||installEnd,9984)],msEnd);
  SCHED.phases.filter(x=>x.kind==='milestone'&&/Milestone [23] /.test(x.task_name)).forEach(x=>{ msEnd=maxD([msEnd,marker(x,projEnd,9985)],msEnd); });

  // 5) CLOSING phases (Full House, sequential after everything)
  let cc=schedNextWorkday(schedAddDays(projEnd>msEnd?projEnd:msEnd,1));
  SCHED.phases.filter(x=>x.kind==='closing').forEach(x=>{
    const start=schedNextWorkday(cc), finish=schedAddWorkdays(start,Math.max(1,x.dur)-1);
    push({room:FULLHOUSE,room_seq:9999,trade_name:x.trade_label,task_name:x.task_name,kind:'closing',tat_days:x.dur,planned_start:start,planned_finish:finish});
    cc=schedAddDays(finish,1);
  });
  return {tasks, unmapped:[...unmapped], spine:withSpine};
}
async function schedUnmapped(p){
  const bo=await schedBoqItems(p); if(bo.error) return [];
  await schedLoadMaster();
  const un=new Set();
  bo.items.forEach(i=>{ const c=schedNorm(i.category); if(c&&!SCHED.map[c]) un.add(c); });
  return [...un];
}
function schedGenerate(p){

    <div class="modal-b">

      <div class="field"><label>KOM / project start date</label><input id="sch-kom" type="date" value="${today}"></div>
      <div class="field"><label>Base-build scope</label>
        <select id="sch-spine">
          <option value="boq">BOQ scope only — furniture / modular</option>

        </select>

      const {error}=await sb.rpc("schedule_replace",{p_project_id:p.id,p_kom:kom,p_tasks:res.tasks});

      schedRenderCard(p,$("#sched-card"));

  };
}
async function schedRenderCard(p, host){
  if(!host) return;
  const ro=!canWrite();
  const {data:sch,error:sErr}=await sb.from("project_schedule").select("*").eq("project_id",p.id).eq("status","active").order("id",{ascending:false}).limit(1);
  if(sErr){ host.innerHTML=`<div class="pw-card" style="font-size:13px;color:var(--clay)">Couldn't load the BOQ schedule: ${esc(sErr.message)}</div>`; return; }

  if(!active){
    host.innerHTML=`<div class="pw-card"><div class="ov-head"><div class="sec-label" style="border:none;padding:0">BOQ-driven schedule <span class="pill">beta</span></div>${ro?'':`<button class="primary" id="sch-gen">⚡ Generate from BOQ</button>`}</div>
      <div style="font-size:13px;color:var(--ink-soft)">Generate a room-wise trade schedule from this project's BOQ, dated from the KOM.${ro?'':' Click “Generate from BOQ”.'}</div></div>`;
    if(!ro&&$("#sch-gen")) $("#sch-gen").onclick=()=>schedGenerate(p);
    return;
  }
  const {data:tasks,error:tErr}=await sb.from("schedule_task").select("*").eq("schedule_id",active.id).order("room_seq").order("seq").order("id");
  if(tErr){ host.innerHTML=`<div class="pw-card" style="font-size:13px;color:var(--clay)">Couldn't load schedule tasks: ${esc(tErr.message)}</div>`; return; }
  const rows=tasks||[];
  const unmapped=await schedUnmapped(p);
  const kickoff=rows.filter(t=>t.kind==='kickoff'), production=rows.filter(t=>t.kind==='production'), milestones=rows.filter(t=>t.kind==='milestone'), closing=rows.filter(t=>t.kind==='closing');
  const tradeRows=rows.filter(t=>(t.kind||'trade')==='trade');
  const rooms=[], byRoom={};
  tradeRows.forEach(t=>{ if(!byRoom[t.room]){ byRoom[t.room]=[]; rooms.push(t.room); } byRoom[t.room].push(t); });
  const end=rows.reduce((m,t)=>(t.planned_finish&&t.planned_finish>m)?t.planned_finish:m,"");
  const doneN=rows.filter(t=>exStatus(t)==='done').length, lateN=rows.filter(t=>exStatus(t)==='late').length;
  const pct=rows.length?Math.round(doneN/rows.length*100):0;
  const inp="font-size:11px;border:1px solid var(--line-2);border-radius:5px;padding:2px 4px";
  // row + section renderers — actual dates / % are editable for writers; status auto-computed
  const trow=(t,pad)=>{ const st=exStatus(t); const cls=st==='late'?'late':st==='done'?'done':'';
    return `<tr data-strow="${t.id}" class="${cls}" style="border-top:1px solid var(--line-2)">`+
      `<td style="padding:3px 8px 3px ${pad}px">${esc(t.task_name||t.trade_name||'—')}${t.source==='spine'?' <span style="font-size:10px;color:var(--ink-soft);border:1px solid var(--line-2);border-radius:4px;padding:0 4px">default</span>':''}</td>`+
      `<td style="padding:3px 8px;white-space:nowrap">${esc(String(t.planned_start||'—'))}</td>`+
      `<td style="padding:3px 8px;white-space:nowrap">${esc(String(t.planned_finish||'—'))}</td>`+
      `<td style="padding:3px 8px" class="num">${t.tat_days}</td>`+
      `<td style="padding:3px 4px">${ro?esc(String(t.actual_start||'—')):`<input type="date" data-sf="actual_start" value="${t.actual_start||''}" style="${inp}">`}</td>`+

      `<td style="padding:3px 4px" class="num">${ro?((t.percent_complete||0)+'%'):`<input type="number" min="0" max="100" data-sf="percent_complete" value="${t.percent_complete||0}" style="width:48px;${inp}">`}</td>`+
      `<td style="padding:3px 8px"><span class="ex-st ${st}">${exStatusLabel(st)}</span></td></tr>`; };
  const shdr=lbl=>`<tr><td colspan="8" style="padding:9px 8px 3px;font-size:11px;font-weight:700;color:var(--brass);letter-spacing:.4px;text-transform:uppercase">${lbl}</td></tr>`;
  const sub=lbl=>`<tr><td colspan="8" style="padding:5px 8px 2px 14px;font-size:11px;font-weight:600;color:var(--ink)">${esc(lbl)}</td></tr>`;
  const roomBlock=room=>{ const rr=byRoom[room]; const trades=[], byTrade={};
    rr.forEach(t=>{ const k=t.trade_name||t.trade_code||'—'; if(!byTrade[k]){byTrade[k]=[]; trades.push(k);} byTrade[k].push(t); });
    return shdr(esc(room))+trades.map(tn=>sub(tn)+byTrade[tn].map(t=>trow(t,28)).join("")).join(""); };
  host.innerHTML=`<div class="pw-card">

function bindSchedTasks(p, host){

      if((f.endsWith('_start')||f.endsWith('_finish')) && val==='') val=null;
      const patch={[f]:val};
      if(f==='actual_finish' && val) patch.percent_complete=100;   // finishing a task marks it 100%
      const {error}=await sb.from("schedule_task").update(patch).eq("id",id);

function ganttHtml(acts){
  const dated=acts.filter(a=>a.planned_start&&a.planned_finish);
  if(!dated.length) return `<div class="gantt"><div style="padding:18px;color:var(--ink-soft);font-size:13px">Set planned start &amp; finish dates below to see the timeline bars and critical path.</div></div>`;
  const toT=d=>new Date(d).getTime();
  const min=Math.min(...dated.map(a=>toT(a.planned_start)));
  const max=Math.max(...dated.map(a=>toT(a.planned_finish), ...dated.filter(a=>a.actual_finish).map(a=>toT(a.actual_finish))));
  const span=Math.max(max-min, 86400000);
  const pos=d=>((toT(d)-min)/span)*100;
  return `<div class="gantt">${acts.map(a=>{
    const st=exStatus(a);
    const hasDates=a.planned_start&&a.planned_finish;
    let bar="";
    if(hasDates){
      const left=pos(a.planned_start), width=Math.max(pos(a.planned_finish)-left,1.5);
      const cls=st==="late"?"late":a.is_critical?"crit":"";
      bar=`<div class="g-bar ${cls}" style="left:${left}%;width:${width}%"></div>`;
      const fillEnd=a.actual_finish?a.actual_finish:(a.percent_complete>0?null:null);
      if(a.percent_complete>0){
        const fw=Math.max(width*(Math.min(a.percent_complete,100)/100),0.8);
        bar+=`<div class="g-fill" style="left:${left}%;width:${fw}%"></div>`;
      }
    }
    return `<div class="gantt-row ${a.is_critical?"crit":""}">
      <div class="g-name">${a.is_critical?'<span class="g-crit-dot"></span>':""}${esc(a.name)}</div>
      <div class="g-track">${bar}</div>
    </div>`;
  }).join("")}</div>`;
}

function bindExec(p,body,acts){
  // inline edits
  body.querySelectorAll("[data-arow]").forEach(tr=>{
    const id=tr.dataset.arow;
    tr.querySelectorAll("[data-ef]").forEach(inp=>inp.onchange=async()=>{
      const f=inp.dataset.ef;
      let val=inp.value;
      if(f==="percent_complete") val=Math.max(0,Math.min(100,Number(val||0)));
      if((f.endsWith("_start")||f.endsWith("_finish")) && val==="") val=null;
      const patch={[f]:val};
      // auto-stamp 100% when actual finish set; auto actual_finish when 100%
      if(f==="actual_finish" && val) patch.percent_complete=100;
      const {error}=await sb.from("project_activities").update(patch).eq("id",id);
      if(error) return toast(error.message);
      pwExecution(p,body); // re-render to refresh gantt, status, delays
    });

  body.querySelectorAll("[data-crit]").forEach(b=>b.onclick=async()=>{

  body.querySelectorAll("[data-edel]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Remove this activity?")) return;
    await sb.from("project_activities").delete().eq("id",b.dataset.edel); pwExecution(p,body);
  });
}

function bindFileDownloads(){
  document.querySelectorAll("[data-dl]").forEach(b=>b.onclick=async()=>{

    if(error) return toast(error.message);
    window.open(data.signedUrl,"_blank");
  });
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Delete this file?")) return;
    // remove the DB row first (so a failed storage cleanup can't orphan a dead pointer)
    const {error:dErr}=await sb.from("project_files").delete().eq("id",b.dataset.del);
    if(dErr) return toast(dErr.message);
    const {error:sErr}=await sb.storage.from("project-files").remove([b.dataset.path]);
    if(sErr) toast("Record removed; file cleanup failed: "+sErr.message);

    if(p) drawProjectTab(p);
  });

async function uploadProjectFile(p,kind){
  const fileInput=$("#pf_file"); const file=fileInput.files[0];
  if(!file) return toast("Choose a file first");
  const hint=$("#pf_hint"); hint.textContent="Uploading…";
  const ext=(file.name.split(".").pop()||"").toLowerCase();
  const path=`${p.id}/${kind}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
  const {error:upErr}=await sb.storage.from("project-files").upload(path,file);
  if(upErr){ hint.textContent=""; return toast(upErr.message); }
  const {error}=await sb.from("project_files").insert({
    project_id:p.id, kind, title:$("#pf_title").value.trim()||file.name,
    version:$("#pf_ver").value.trim()||null, storage_path:path,
    file_type:ext, size_bytes:file.size, uploaded_by:me.id
  });
  if(error){ hint.textContent=""; return toast(error.message); }
  toast("Uploaded"); pwFiles(p,$("#pwBody"),kind);
}

/* ===== BOQ GENERATOR MODULE ===== */
/* ===================== FULL BOQ GENERATOR (ported) ===================== */
/* State for the generator, scoped per open BOQ version */
let G = { ver:null, rows:[], rates:[], uid:0, tab:'est', dirty:false, projectId:null, leadId:null, boqId:null };

async function pwBoq(p, body){
  G.projectId = p.id; G.leadId = null;
  // load rate library once
  if(!G.rates.length){
    const {data}=await sb.from("rate_library").select("*").eq("is_active",true).order("category");
    G.rates=(data||[]).map(r=>({cat:r.category,item:r.item,unit:r.uom,rate:Number(r.rate)||0,cost:Number(r.cost_rate)||0,id:r.id,stream:r.stream||null}));
  }
  // find or offer to create a BOQ version for this project
  const {data:versions}=await sb.from("boq_versions").select("*").eq("project_id",p.id).order("version",{ascending:false}).order("id",{ascending:false});
  if(!versions||!versions.length){
    body.innerHTML=`<div class="pw-card">${emptyState("No BOQ on this project yet","Start the full BOQ generator for this project.")}
      ${canWrite()?`<div style="text-align:center"><button class="primary" id="pwNewBoq">+ Start project BOQ</button></div>`:""}</div>`;
    if(canWrite()) $("#pwNewBoq").onclick=async()=>{
      const id=await newBoqFor({project_id:p.id,title:p.name});
      if(!id) return;
      // seed meta from project
      await sb.from("boq_versions").update({client_name:p.client_name||p.name,client_phone:p.client_phone,client_email:p.client_email,project_name:p.name,property:p.site_address,quote_date:new Date().toISOString().slice(0,10)}).eq("id",id);
      pwBoq(p,body);
    };
    return;
  }
  // Versions: newest first. Open the one the user picked, else the newest.
  G.versions = versions;
  const picked = versions.find(v=>String(v.id)===String(G.openVersionId));
  G.boqId = (picked||versions[0]).id;
  G.ver   = picked||versions[0];
  G.openVersionId = G.boqId;
  // load items
  const {data:items}=await sb.from("boq_items").select("*").eq("boq_version_id",G.boqId).order("sort_idx");
  G.rows=(items||[]).map((r,i)=>({
    id:i, dbid:r.id, room:r.room||r.room_tag||"General", cat:r.category||"", item:r.item_name||r.description||"",
    unit:r.uom||"", rate:Number(r.rate)||0, originalRate:Number(r.rate)||0,
    w:Number(r.width)||0, h:Number(r.height)||0, qty:Number(r.qty)||0,
    amount:(Number(r.rate)||0)*(Number(r.qty)||0), remarks:r.remarks||"", custom:!!r.is_custom,
    cost:Number(r.cost_rate)||0,
    scope:(r.scope==='excluded'||r.scope==='optional')?r.scope:'included',
    stream:normStream(r.stream||classifyStream(r.category)), lineDisc:Number(r.line_disc_pct)||0
  }));
  G.uid=G.rows.length;
  gRender(p, body);
}

/* ---- BOQ sections (streams) + per-section financials ---- */
const STREAMS=[['modular','Modular / KWS'],['carpentry','Lintel — On-site Carpentry'],['services','Lintel — Services'],['furnishing','Loose Furniture, Decor & Appliances']];
const STREAM_KEYS=STREAMS.map(s=>s[0]);
const STREAM_LABEL=Object.fromEntries(STREAMS);
const STREAM_DEFAULTS={fee:9,gst:18,disc:0,boost:0}; // owner default: 9% fee / 18% GST on every section
const FURNISHING='furnishing'; // the only section with per-line discount
function normStream(s){ return STREAM_KEYS.indexOf(s)>=0?s:'modular'; }
// Classify a category into a section: rate-library tag first, then keyword fallback (mirrors boq_category_trade_map).
function classifyStream(cat){
  if(!cat) return 'modular';
  const c=String(cat).trim().toLowerCase();
  const hit=(G.rates||[]).find(r=>r.cat&&r.cat.trim().toLowerCase()===c&&r.stream);
  if(hit) return normStream(hit.stream);
  if(/wallpaper|mural|mirror|glass|curtain|sofa|console|dining|appliance|chimney|hob|decor|furnish|furniture/.test(c)) return 'furnishing';
  if(/civil|demolition|demolish|plumb|electric|false ?ceiling|ceiling|paint|texture|tile|tiling|stone|granite|quartz|marble|water ?proof|plaster|masonry|brick|\bpop\b|pelmet|window|partition|dado|counter|flooring/.test(c)) return 'services';
  if(/panel|panelling|paneling|trim|carpentry|\bdoor/.test(c)) return 'carpentry';
  return 'modular';
}
// Resolved section for a row: persisted stream wins; else classify from its category.
function rowStream(r){ return normStream(r&&r.stream?r.stream:classifyStream(r&&r.cat)); }
// Per-section financial settings (boq_versions.stream_settings jsonb; absent keys use STREAM_DEFAULTS).
// No fallback to the legacy fee_pct/gst_pct/disc_pct/boost_pct columns — BOQ-STREAMS-02 materialized
// them into stream_settings; a silent fallback is how a stale 20% discount hit every section on lead 104.
function gStreamSettings(stream){
  const ss=(G.ver&&G.ver.stream_settings)||{}, s=ss[stream]||{};
  const pick=(a,d)=>{ const v=(a!==undefined&&a!==null&&a!=='')?a:d; return Number(v)||0; };
  return {fee:pick(s.fee,STREAM_DEFAULTS.fee),gst:pick(s.gst,STREAM_DEFAULTS.gst),disc:pick(s.disc,STREAM_DEFAULTS.disc),boost:pick(s.boost,STREAM_DEFAULTS.boost)};
}
function gSetStreamSetting(stream,key,val){
  G.ver=G.ver||{}; const ss=(G.ver.stream_settings=G.ver.stream_settings||{});
  ss[stream]=ss[stream]||{}; ss[stream][key]=Number(val)||0; G.dirty=true;
}
function gScope(r){ const s=r&&r.scope; return (s==='excluded'||s==='optional')?s:'included'; }
function gIncluded(){ return G.rows.filter(r=>gScope(r)==='included'); }
function gScopeTag(r){ const s=gScope(r); return s==='excluded'?'<span class="gtag gtag-exc">Excluded</span>':s==='optional'?'<span class="gtag gtag-opt">Optional</span>':''; }
// Per-line discount % (only meaningful in the furnishing section).
function gLineDisc(r){ return rowStream(r)===FURNISHING?(Number(r.lineDisc)||0):0; }
// Line value before section boost, after any per-line discount.
function gLineBase(r){ const base=r.originalRate!==undefined?r.originalRate:r.rate; return (Number(base)||0)*(Number(r.qty)||0)*(1-gLineDisc(r)/100); }
// Boosted line amount using THIS row's section boost.
function gBoosted(r){ const b=gStreamSettings(rowStream(r)).boost; return Math.round(gLineBase(r)*(1+b/100)); }
function gBoost(){ return 0; } // legacy shim — per-section boost now lives in gStreamSettings()
// Financials for one section.
function gStreamFin(stream){
  const cfg=gStreamSettings(stream);
  const rows=gIncluded().filter(r=>rowStream(r)===stream); // A2: excluded/optional never sum
  const sub=rows.reduce((s,r)=>s+gLineBase(r),0);
  const subM=rows.reduce((s,r)=>s+gBoosted(r),0);
  const fee=Math.round(subM*cfg.fee/100);
  const disc=Math.round((subM+fee)*cfg.disc/100);
  const base=subM+fee-disc;
  const gst=Math.round(base*cfg.gst/100);
  return {stream,cfg,n:rows.length,sub,subM,fee,disc,base,gst,total:base+gst};
}
// Grand total across all sections (also the shape gFin() used to return).
function gGrand(){
  const per=STREAM_KEYS.map(gStreamFin);
  const S=k=>per.reduce((s,f)=>s+f[k],0);
  return {per,sub:S('sub'),subM:S('subM'),fee:S('fee'),disc:S('disc'),base:S('base'),gst:S('gst'),total:S('base')+S('gst')};
}
function gFin(){ return gGrand(); } // back-compat: callers using .subM/.fee/.disc/.gst/.total still work
function gFmt(n){ return '₹'+Math.round(n).toLocaleString('en-IN'); }
function gRooms(){ const o=[]; G.rows.forEach(r=>{ if(o.indexOf(r.room)===-1)o.push(r.room); }); return o; }
function gRoomsIn(stream){ const o=[]; G.rows.forEach(r=>{ if(rowStream(r)===stream&&o.indexOf(r.room)===-1)o.push(r.room); }); return o; }
// Sections that actually contain rows, in canonical order.
function gActiveStreams(){ return STREAM_KEYS.filter(k=>G.rows.some(r=>rowStream(r)===k)); }

/* ---- BOQ lock (BOQ-LOCK-01) ------------------------------------------------
   A BOQ version freezes the moment the client commits: either the lead is
   converted to a project, or a payment is recorded on that project. Postgres
   stamps boq_versions.locked_at and blocks writes; only role="admin" (Amit)
   can still edit. Everyone else raises a NEW revision, which starts unlocked.
   The gating below is convenience only — the triggers are the real boundary. */
const BOQ_ADVANCE_PCT = 0.10;   // advance required before a lead may convert
const LOCK_REASON_TEXT = {
  converted_to_project: "the lead was converted to a project",
  payment_received:     "the client payment was received",
  backfill:             "this project was already live"
};
function gLockInfo(){
  const v=G.ver||{};
  return { locked:!!v.locked_at, lockedAt:v.locked_at, reason:v.locked_reason||"",
           sentAt:v.proposal_sent_at };
}
function gLocked(){ return !!((G.ver||{}).locked_at); }
// The single source of truth for "may this user change this BOQ version?"
function gCanEdit(){ return canWrite() && (!gLocked() || isBoqAdmin()); }

function gLockBanner(){
  const L=gLockInfo();
  const box=(bg,bd,html)=>`<div style="margin-bottom:12px;padding:11px 14px;border:1px solid ${bd};background:${bg};border-radius:10px;font-size:12.5px;line-height:1.55">${html}</div>`;
  const when=L.lockedAt?new Date(L.lockedAt).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}):"";
  const why=LOCK_REASON_TEXT[L.reason]||"the client committed";
  const sent=L.sentAt?` · proposal emailed ${new Date(L.sentAt).toLocaleDateString("en-IN",{day:"2-digit",month:"short"})}`:"";
  if(L.locked && !isBoqAdmin())
    return box("#F6E7E3","#D9A79B",`🔒 <b>This BOQ is locked.</b> Frozen on ${esc(when)} because ${esc(why)}${sent}. Only Amit can change it — use <b>New revision</b> to quote a variation.`);
  if(L.locked && isBoqAdmin())
    return box("#FBF5E6","#D4B06A",`🔓 <b>Locked BOQ — you are editing as admin.</b> Frozen ${esc(when)} (${esc(why)})${sent}. Changes are recorded against your name.`);
  if(L.sentAt)
    return box("#EAF0F6","#A9C2DA",`📤 <b>Proposal emailed to the client on ${esc(new Date(L.sentAt).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}))}.</b> This BOQ locks automatically once the lead converts or a payment is received.`);
  return "";
}

/* ---- Proposal PDF ----------------------------------------------------------
   The browser's own "Save as PDF" can't be driven from code, so we build the
   file from the SAME #client-sheet the team already prints. Numbers therefore
   always match Print/PDF — no BOQ money math is re-implemented anywhere.
   html2pdf is fetched on demand only (never on normal page loads). */
const GPDF_LIB="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js";
function gLoadLib(src){
  return new Promise((res,rej)=>{
    if(window.html2pdf) return res();
    const s=document.createElement("script");
    s.src=src; s.onload=()=>res(); s.onerror=()=>rej(new Error("Could not load the PDF library — check your connection"));
    document.head.appendChild(s);
  });
}
function gPdfName(){
  const v=G.ver||{};
  return ("Lintel-Proposal-"+(v.project_name||v.client_name||"quotation")+"-"+(v.version_label||("v"+v.version)))
         .replace(/[^\w.-]+/g,"-").replace(/-+/g,"-")+".pdf";
}
const GPDF_W = 794;   // 210mm at 96dpi — capture at true A4 width
// Renders the client sheet (switching tabs if needed) and returns a PDF Blob.
async function gPdfBlob(p){
  await gLoadLib(GPDF_LIB);
  const body=G.bodyEl||$("#pwBody");
  const prev=G.tab;
  if(prev!=="cli"){ G.tab="cli"; gRender(p,body); await new Promise(r=>setTimeout(r,300)); }
  let holder=null;
  try{
    const el=$("#client-sheet");
    if(!el) throw new Error("Client view not available");
    /* Capture an isolated CLONE at a fixed A4 width rather than the live node.
       Captured in place, the app's layout squeezed the sheet and html2canvas
       produced a canvas narrower than the content — the right-hand Amount
       column was cut off. The injected rules also stop a page break landing
       mid-row, which sliced rows in half at every page boundary. */
    holder=document.createElement("div");
    holder.style.cssText="position:fixed;left:-10000px;top:0;width:"+GPDF_W+"px;background:#fff;z-index:-1";
    const clone=el.cloneNode(true);
    clone.style.width=GPDF_W+"px"; clone.style.maxWidth="none"; clone.style.margin="0";
    const css=document.createElement("style");
    css.textContent="*{box-sizing:border-box}"+
      "table{width:100%!important;border-collapse:collapse}"+
      "tr,td,th{page-break-inside:avoid!important;break-inside:avoid!important}"+
      "thead{display:table-header-group}";   // repeat headers on each page
    holder.appendChild(css); holder.appendChild(clone);
    document.body.appendChild(holder);

    /* The real sheet is WIDER than A4-at-96dpi (838px vs 794px on the Amit BOQ),
       so a fixed 794px capture still clipped the right edge. Capture at the
       sheet's own natural width instead — the PDF scales it to the page. */
    const W = Math.max(GPDF_W, clone.scrollWidth, el.scrollWidth);
    holder.style.width = W+"px"; clone.style.width = W+"px";
    const Hcss = Math.max(clone.scrollHeight, 1);

    /* Adaptive scale. Safari (and every iPhone/iPad) caps canvas AREA at
       ~16.7M px² and silently BLANKS everything beyond it — on a 105-item BOQ
       (8,600 CSS px tall) a fixed scale of 2 needs a 27M px² canvas, so the
       bottom ~40% of the quote simply vanished: the "half BOQ" PDF. Scale down
       just enough that the full sheet always fits within the safest limit. */
    const SAFE_AREA = 14e6;
    const scale = Math.min(2, Math.sqrt(SAFE_AREA/(W*Hcss)));

    /* Paginate by hand. html2pdf's own paging (even with avoid-all / avoid:'tr')
       slices the rasterised sheet at fixed heights and cuts straight through
       table rows. Instead: rasterise once, work out every row's bottom edge,
       and only ever cut the image there. */
    // The bundle keeps html2canvas / jsPDF private, so reach them via the worker.
    const opts={ html2canvas:{scale:scale,useCORS:true,backgroundColor:"#ffffff",
                              width:W,windowWidth:Math.max(W,1024),scrollX:0,scrollY:0},
                 jsPDF:{unit:"mm",format:"a4",orientation:"portrait"} };
    const canvas = await window.html2pdf().set(opts).from(clone).toCanvas().get("canvas");
    // If the browser couldn't rasterise the whole sheet (width clipped, or the
    // height came out well SHORT of the layout), refuse: a loud failure beats
    // silently emailing a client a partial quotation. (Taller is fine —
    // html2pdf re-lays-out the clone in its own frame, so height drifts a bit.)
    if(Math.abs(canvas.width - Math.round(W*scale)) > 4 || canvas.height < 0.9*Hcss*scale){
      throw new Error("This browser could not render the full quotation ("+canvas.width+"×"+canvas.height+
                      " of "+Math.round(W*scale)+"×"+Math.round(Hcss*scale)+"). Try from a desktop browser.");
    }
    // jsPDF hands back a plain object whose constructor can't be re-invoked, so
    // borrow this instance and drop its placeholder page once ours are added.
    const pdf = await window.html2pdf().set(opts).from(document.createElement("div")).toPdf().get("pdf");
    const M=8, pageWmm=210-2*M, pageHmm=297-2*M;
    const pxPerMm = canvas.width/pageWmm;               // canvas px per mm
    const pageHpx = Math.floor(pageHmm*pxPerMm);        // canvas px that fit on one page

    /* Where may a page break? DOM-measured positions drift against the canvas
       (html2pdf re-lays-out the clone in its own frame), so don't trust them.
       Read the PIXELS instead — but note "one uniform colour" is the WRONG
       test: the sheet's card borders run vertically down the whole table, so
       no scanline is ever a single colour. What identifies a text-free gap is
       a run of CONSECUTIVE scanlines that are identical to each other —
       vertical borders repeat perfectly row after row, text never does. */
    const ctx = canvas.getContext("2d",{willReadFrequently:true});
    const inset=Math.max(12, Math.round(canvas.width*0.012));  // skip sheet edge/shadow
    function findCut(cursor,target){
      // Search the whole page upward if needed — a shorter page beats a sliced row.
      const band=Math.max(0, target-cursor-100);
      if(band<=0) return target;
      const y0=target-band;
      const img=ctx.getImageData(0,y0,canvas.width,band+1<canvas.height-y0?band+1:band).data;
      const rowsN=Math.floor(img.length/(canvas.width*4));
      const rowEq=(a,b)=>{
        const oa=a*canvas.width*4, ob=b*canvas.width*4;
        for(let x=inset;x<canvas.width-inset;x+=3){ const p=x*4;
          if(Math.abs(img[oa+p]-img[ob+p])>8||Math.abs(img[oa+p+1]-img[ob+p+1])>8||Math.abs(img[oa+p+2]-img[ob+p+2])>8) return false; }
        return true;
      };
      const whiteish=(r)=>{                             // mostly-white row (borders allowed)
        const off=r*canvas.width*4; let dark=0, n=0;
        for(let x=inset;x<canvas.width-inset;x+=6){ const o=off+x*4; n++;
          if(img[o]<235||img[o+1]<235||img[o+2]<235) dark++; }
        return dark<=n*0.06;
      };
      const NEED=6;                                     // ≥6 identical consecutive rows = text-free gap
      let streak=1, bestWhite=-1, bestAny=-1;
      for(let r=1;r<rowsN;r++){
        streak = rowEq(r,r-1) ? streak+1 : 1;
        if(streak>=NEED){
          const mid=y0 + r - (NEED>>1);
          if(mid>cursor+100 && mid<=target){
            if(whiteish(r)){ bestWhite=mid; } else { bestAny=mid; }
          }
        }
      }
      if(bestWhite>0) return bestWhite;                 // gap between rows — perfect
      if(bestAny>0)  return bestAny;                    // inside a solid band — acceptable
      return target;                                    // nothing text-free -> hard cut
    }

    let cursor=0, page=0;
    while(cursor < canvas.height-2){
      const target = cursor + pageHpx;
      const cut = (target < canvas.height) ? findCut(cursor,target) : canvas.height;

      const hpx = cut-cursor;
      const slice=document.createElement("canvas");
      slice.width=canvas.width; slice.height=hpx;
      slice.getContext("2d").drawImage(canvas,0,cursor,canvas.width,hpx,0,0,canvas.width,hpx);
      pdf.addPage();
      pdf.addImage(slice.toDataURL("image/jpeg",0.95),"JPEG",M,M,pageWmm,hpx/pxPerMm);
      cursor=cut; page++;
      if(page>60) break;                                // guard against a pathological loop
    }
    if(page>0) pdf.deletePage(1);                       // remove the borrowed placeholder page
    return pdf.output("blob");
  } finally {
    if(holder) holder.remove();
    if(prev!=="cli"){ G.tab=prev; gRender(p,body); }
  }
}
/* Snapshot the rendered client sheet and mint a client-facing link.
   Snapshotting (rather than re-rendering later) keeps the client's copy exactly
   as it was sent, and means the BOQ money math is never duplicated anywhere. */
const QUOTE_VIEW_BASE="https://os.lintelspace.com/quote.html";
async function gMakeQuoteLink(p){
  const body=G.bodyEl||$("#pwBody");
  const prev=G.tab;
  if(prev!=="cli"){ G.tab="cli"; gRender(p,body); await new Promise(r=>setTimeout(r,300)); }

  try{

    html=el.outerHTML;
  } finally {

  }
  const v=G.ver||{};
  const {data,error}=await sb.from("quote_shares").insert({
    boq_version_id:G.boqId, html:html,
    title:(v.project_name||v.client_name||"Quotation"),
    client_name:v.client_name||null, total:Number(v.total)||null,
    created_by:me.id, expires_at:v.validity_date?new Date(v.validity_date+"T23:59:59").toISOString():null
  }).select("token").single();
  if(error) throw new Error("Could not create the quotation link: "+error.message);
  return { token:data.token, url:QUOTE_VIEW_BASE+"?t="+data.token };
}

/* One-click download — replaces "print, then Save as PDF". */
async function gDownloadPdf(p){
  try{
    toast("Building PDF…");
    const blob=await gPdfBlob(p);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=gPdfName(); a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),3000);
    toast("PDF downloaded");
  }catch(e){ toast("Could not build the PDF: "+(e.message||e)); }
}

/* Email the proposal to the client from contact@lintelspace.com, BCC the team.
   Sending happens in the send-proposal edge function (it holds the Resend key
   and resolves the BCC list server-side, so recipients can't be tampered with). */
/* Resolve the client's address the SAME way send-proposal does: the BOQ's own
   meta field is usually blank (and on a locked BOQ nobody but Amit could fill
   it), so fall back to the project, then the lead. Some records hold several
   addresses in one field — take the first valid one. Keep this in step with the
   edge function; they used to disagree, which blocked sending entirely. */
function gClientEmail(p){
  const v=G.ver||{};
  const raw=[v.client_email, p&&p.client_email, p&&p.email]
    .map(x=>String(x||"").trim()).find(x=>x) || "";
  return (raw.split(/[\s,;]+/).find(e=>/.+@.+\..+/.test(e)) || "").trim();
}
async function gSendProposal(p, body){
  if(!canWrite()||!G.boqId) return;
  const v=G.ver||{};
  const to=gClientEmail(p);
  if(!to) return toast("No client email on this BOQ, its project or its lead — add one in Client Details first.");
  const again=v.proposal_sent_at?"\n\nThis proposal was already emailed on "+new Date(v.proposal_sent_at).toLocaleString("en-IN")+".":"";
  if(!confirm("Email this proposal to "+to+"?\n\nThe quotation PDF is attached, sent from contact@lintelspace.com, BCC to the assigned team and Amit."+again)) return;
  try{
    // 1. a client-facing link (primary call-to-action in the email)
    toast("Preparing quotation…");
    const link=await gMakeQuoteLink(p);
    // 2. the same sheet as a PDF, parked in project-files for the edge function
    //    to attach (the browser never handles the mail itself)
    toast("Building PDF…");
    const blob=await gPdfBlob(p);
    // Timestamped, so every send is its own object: re-sending never overwrites
    // (an overwrite is an UPDATE, which this bucket had no policy for) and we
    // keep a record of exactly which PDF each client was sent.
    const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,"-");
    const path="proposals/"+G.boqId+"/"+stamp+"-"+gPdfName();
    const {error:upErr}=await sb.storage.from("project-files")
      .upload(path,blob,{contentType:"application/pdf",upsert:false});
    if(upErr) throw new Error("Could not store the PDF: "+upErr.message);
    toast("Sending proposal…");
    const {data,error}=await sb.functions.invoke("send-proposal",{ body:{ boq_version_id:G.boqId, pdf_path:path, pdf_name:gPdfName(), quote_url:link.url } });
    if(error) throw error;
    if(data&&data.error) throw new Error(data.error);
    const nowIso=(data&&data.sent_at)||new Date().toISOString();
    G.ver.proposal_sent_at=nowIso;
    gLogActivity(p,"Proposal emailed to "+to+(data&&data.bcc_count?" (BCC "+data.bcc_count+" team member"+(data.bcc_count===1?"":"s")+")":""));
    toast("Proposal emailed to "+to);
    gRender(p,body);
  }catch(e){
    toast("Could not send proposal: "+(e.message||e));
  }
}

/* Copy the current BOQ into a fresh, unlocked revision. */
async function gNewRevision(p, body){
  if(!canWrite()||!G.boqId) return;
  const src=G.ver||{};
  if(!confirm("Create a new revision?\n\nIt copies this BOQ's line items into a new version that starts unlocked, so the version the client already has stays untouched.")) return;
  const id=await newBoqFor({project_id:p.id,title:p.name});
  if(!id) return toast("Could not create the revision");
  await sb.from("boq_versions").update({
    client_name:src.client_name,client_phone:src.client_phone,client_email:src.client_email,
    project_name:src.project_name,property:src.property,
    consultant:src.consultant,consultant_phone:src.consultant_phone,
    quote_date:new Date().toISOString().slice(0,10),
    stream_settings:src.stream_settings||{}
  }).eq("id",id);
  const {data:srcItems}=await sb.from("boq_items").select("*").eq("boq_version_id",src.id);
  if(srcItems&&srcItems.length){
    const copies=srcItems.map(r=>{ const c={...r}; delete c.id; c.boq_version_id=id; return c; });
    const {error:cErr}=await sb.from("boq_items").insert(copies);
    if(cErr) toast("Revision created, but copying items failed: "+cErr.message);
  }
  gLogActivity(p,"New BOQ revision created from "+(src.version_label||("v"+src.version)));
  G.openVersionId=id; gStopAutosave();
  toast("New revision created — this one is editable");
  pwBoq(p,body);
}

// Render all visible section cards (one per BOQ stream).
function gSectionsHtml(ro){
  if(!G.rows.length) return `<div class="pw-card"><div class="empty">No items yet — add from the rate library or a custom item above.</div></div>`;
  const secs=(G.section==='all')?gActiveStreams():[G.section];
  if(!secs.length) return `<div class="pw-card"><div class="empty">No items yet.</div></div>`;
  return secs.map(st=>gSectionCard(st,ro)).join("");
}
function gSectionCard(st,ro){
  const fin=gStreamFin(st), label=STREAM_LABEL[st], showDisc=(st===FURNISHING);
  const secRows=G.rows.filter(r=>rowStream(r)===st);
  const colCount=(ro?11:13)+(showDisc?1:0);
  const subCols=ro?(showDisc?9:8):(showDisc?10:9);   // columns before the Amount cell
  const head=ro
    ? `<th>Room</th><th>Category</th><th>Item</th><th>Unit</th><th>Rate</th><th>W</th><th>H</th><th>Qty</th>${showDisc?'<th>Disc%</th>':''}<th>Amount</th><th>Remarks</th><th>Scope</th>`
    : `<th>Section</th><th>Room</th><th>Category</th><th>Item</th><th>Unit</th><th>Rate</th><th>W</th><th>H</th><th>Qty</th>${showDisc?'<th>Disc%</th>':''}<th>Amount</th><th>Remarks</th><th>Scope</th><th></th>`;
  let body='';
  if(!secRows.length){
    body=`<tr><td colspan="${colCount}" class="empty">No items in this section yet.</td></tr>`;
  } else {
    const rooms=[]; secRows.forEach(r=>{ if(rooms.indexOf(r.room)===-1)rooms.push(r.room); });
    rooms.forEach(room=>{
      const rr=secRows.filter(r=>r.room===room);
      const rsub=rr.filter(r=>gScope(r)==='included').reduce((s,r)=>s+gBoosted(r),0);
      body+=`<tr class="roomhdr"><td colspan="${ro?colCount:colCount-1}">${esc(room)}</td>${ro?'':`<td style="text-align:right"><button class="linkbtn" data-copyroom="${esc(room)}" data-sec="${st}" title="Duplicate this room">⧉ Copy</button></td>`}</tr>`;
      rr.forEach(r=>{ body+=gRowHtml(r,ro,showDisc); });
      body+=`<tr class="roomsub"><td colspan="${subCols}" style="text-align:right">Subtotal — ${esc(room)}</td><td style="font-weight:600">${gFmt(rsub)}</td><td colspan="${colCount-subCols-1}"></td></tr>`;
    });
  }
  return `<div class="pw-card gsec" data-sec="${st}">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <div style="font-weight:700;color:var(--brass-deep)">${esc(label)}</div>
      <div style="font-size:12px;color:var(--ink-soft)">${fin.n} item${fin.n===1?'':'s'} · section total <b>${gFmt(fin.total)}</b></div>
    </div>
    <div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
    ${gSectionFooter(st,ro,fin)}
  </div>`;
}

function gDrawTable(ro){ const t=$("#gsecs"); if(t) t.innerHTML=gSectionsHtml(ro); gBindTable(ro); }
function gBindTable(ro){
  if(ro) return;
  $$("#gsecs .ii").forEach(inp=>{
    inp.onchange=()=>{
      const r=G.rows.find(x=>x.id==inp.dataset.id), f=inp.dataset.f;
      if(!r) return;
      if(['rate','w','h','qty'].includes(f)){ r[f]=parseFloat(inp.value)||0; if(f==='rate')r.originalRate=r.rate; if((f==='w'||f==='h')&&r.w&&r.h)r.qty=Math.round(r.w*r.h*10)/10; r.amount=r.rate*r.qty; gDrawTable(ro); gTotals(); }
      else if(f==='linedisc'){ r.lineDisc=Math.max(0,Math.min(100,parseFloat(inp.value)||0)); gDrawTable(ro); gTotals(); }
      else if(f==='stream'){ r.stream=normStream(inp.value); G.dirty=true; gDrawTable(ro); gTotals(); }
      else if(f==='cat'){
        r.cat=inp.value;
        // reset item to first in new category + update rate/unit
        const catItems=G.rates.filter(x=>x.cat===r.cat);
        if(catItems.length){ r.item=catItems[0].item; r.unit=catItems[0].unit; r.rate=catItems[0].rate; r.originalRate=r.rate; r.amount=r.rate*r.qty; r.cost=catItems[0].cost||0; }
        G.dirty=true; gDrawTable(ro); gTotals();
      }
      else if(f==='item'){
        r.item=inp.value;
        // auto-fill rate and unit from library
        const lib=G.rates.find(x=>x.item===r.item&&x.cat===r.cat);
        if(lib){ r.unit=lib.unit; r.rate=lib.rate; r.originalRate=lib.rate; r.amount=r.rate*r.qty; r.cost=lib.cost||0; }
        G.dirty=true; gDrawTable(ro); gTotals();
      }
      else if(f==='scope'){ r.scope=(inp.value==='excluded'||inp.value==='optional')?inp.value:'included'; G.dirty=true; gDrawTable(ro); gTotals(); }
      else { r[f]=inp.value; if(f==='room'){gDrawTable(ro);} }
      G.dirty=true;
    };
  });
  // per-section financial settings (fee / discount / GST / boost)
  $$("#gsecs .ii-sec").forEach(inp=>{
    inp.onchange=()=>{ gSetStreamSetting(inp.dataset.sec, inp.dataset.k, inp.value); gDrawTable(ro); gTotals(); };
  });
  $$("#gsecs [data-del]").forEach(btn=>btn.onclick=(e)=>{
    e.preventDefault(); e.stopPropagation();
    const delId=btn.dataset.del;
    const before=G.rows.length;
    G.rows=G.rows.filter(r=>String(r.id)!==String(delId));
    if(G.rows.length<before){ G.dirty=true; gDrawTable(ro); gTotals(); refreshRoomDL(); toast("Item removed"); }
  });
  // Feature 3: Copy room (within its section)
  $$("#gsecs [data-copyroom]").forEach(btn=>btn.onclick=(e)=>{
    e.preventDefault(); e.stopPropagation();
    const srcRoom=btn.dataset.copyroom, srcSec=btn.dataset.sec;
    const src=G.rows.filter(r=>r.room===srcRoom && rowStream(r)===srcSec);
    if(!src.length) return toast("No items in this room to copy");
    const newName=prompt("New room name (copy of "+srcRoom+"):",srcRoom+" 2");
    if(newName===null) return; // user cancelled
    const finalName=(newName&&newName.trim())?newName.trim():srcRoom+" 2";
    // ensure uid counter is valid (guard against undefined/collision)
    if(typeof G.uid!=="number"||!G.uid){ G.uid=(G.rows.reduce((m,r)=>Math.max(m,Number(r.id)||0),0))+1; }
    src.forEach(r=>{
      G.rows.push({id:G.uid++,room:finalName,cat:r.cat,item:r.item,unit:r.unit,rate:r.rate,originalRate:r.originalRate,w:r.w,h:r.h,qty:r.qty,amount:r.amount,remarks:r.remarks,custom:r.custom,cost:r.cost||0,scope:gScope(r),stream:rowStream(r),lineDisc:Number(r.lineDisc)||0});
    });
    G.dirty=true; gDrawTable(ro); gTotals(); refreshRoomDL(); toast("Copied "+src.length+" items to "+finalName);
  });
}
function gReRenderEst(){ if(G.ctx){ gEstimator(G.ctx); } else { gDrawTable(false); gTotals(); refreshRoomDL(); } }
function gAddLib(){
  const stream=normStream($("#in-stream")?$("#in-stream").value:'modular');
  const room=$("#in-room").value.trim(),cat=$("#in-cat").value,item=$("#in-item").value,qty=parseFloat($("#in-qty").value)||0,w=parseFloat($("#in-w").value)||0,h=parseFloat($("#in-h").value)||0;
  if(!room||!cat||!item||!qty) return toast("Fill Room, Category, Item and Qty");
  const f=G.rates.find(r=>r.item===item&&r.cat===cat); const rate=f?f.rate:0,unit=f?f.unit:'';
  G.rows.push({id:G.uid++,room,cat,item,unit,rate,originalRate:rate,w,h,qty,amount:rate*qty,remarks:'',custom:false,cost:f?f.cost:0,stream,lineDisc:0});
  G.dirty=true; $("#in-qty").value='';$("#in-w").value='';$("#in-h").value='';

function gAddCustom(){
  const stream=normStream($("#ci-stream")?$("#ci-stream").value:'modular');
  const room=$("#ci-room").value.trim(),cat=$("#ci-cat").value.trim()||'Custom',item=$("#ci-item").value.trim(),rate=parseFloat($("#ci-rate").value)||0,qty=parseFloat($("#ci-qty").value)||0,w=parseFloat($("#ci-w").value)||0,h=parseFloat($("#ci-h").value)||0;
  if(!room||!item||!qty) return toast("Fill Room, Item and Qty");
  G.rows.push({id:G.uid++,room,cat,item,unit:'LS',rate,originalRate:rate,w,h,qty,amount:rate*qty,remarks:'',custom:true,cost:0,stream,lineDisc:0});
  G.dirty=true; ["ci-room","ci-cat","ci-item","ci-rate","ci-w","ci-h","ci-qty"].forEach(i=>$("#"+i).value='');
  if(G.section!=='all') G.section=stream;
  gReRenderEst();
  // Feature 4: auto-save to rate library if not already there (tagged to the chosen section)
  if(!G.rates.find(r=>r.item===item&&r.cat===cat)){
    sb.from("rate_library").insert({category:cat,item:item,uom:'LS',rate:rate,is_active:true,stream:stream}).select().single().then(({data,error})=>{
      if(!error&&data){ G.rates.push({cat,item,unit:'LS',rate,cost:0,id:data.id,stream:stream}); toast("Added to rate library: "+item); }
      else if(error) console.error("Library add error:",error.message);
    });
  }
}

async function gImportFrom(p,fullBoq){
  const {data:boqs}=await sb.from("boq_versions").select("id,project_id,lead_id,project_name,client_name,version").order("version",{ascending:false}).order("id",{ascending:false});
  if(!boqs||!boqs.length) return toast("No other BOQs found");
  // exclude current BOQ
  const others=boqs.filter(b=>b.id!==G.boqId);
  if(!others.length) return toast("No other BOQs to import from");
  openModal(`
    <div class="modal-h">${fullBoq?"Import entire BOQ":"Import a room"}</div>
    <div class="modal-b">
      <div class="field"><label>Select source BOQ</label>
        <select id="imp-boq" class="lf-sel" style="width:100%">
          <option value="">— select —</option>
          ${others.map(b=>`<option value="${b.id}">${esc(b.project_name||b.client_name||"BOQ")} (v${b.version})</option>`).join("")}
        </select>
      </div>
      ${fullBoq?'':`<div class="field" id="imp-room-wrap" style="display:none"><label>Select room to import</label><select id="imp-room" class="lf-sel" style="width:100%"></select></div>`}
      <div id="imp-preview" style="margin-top:10px"></div>
    </div>
    <div class="modal-f"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" id="imp-go" disabled>Import</button></div>`);
  let importItems=[];
  const boqSel=$("#imp-boq");
  boqSel.onchange=async()=>{
    const bid=boqSel.value; if(!bid){ importItems=[]; return; }
    const {data:items}=await sb.from("boq_items").select("*").eq("boq_version_id",bid).order("sort_idx");
    if(!items||!items.length){ $("#imp-preview").innerHTML='<div style="color:var(--ink-soft)">This BOQ has no items.</div>'; importItems=[]; return; }
    if(fullBoq){
      importItems=items;
      $("#imp-preview").innerHTML=`<div style="font-size:13px"><b>${items.length}</b> items across <b>${[...new Set(items.map(i=>i.room||i.room_tag))].length}</b> rooms will be imported.</div>`;
      $("#imp-go").disabled=false;
    } else {
      const rooms=[...new Set(items.map(i=>i.room||i.room_tag||"General"))];
      const wrap=$("#imp-room-wrap"); wrap.style.display="";
      const rsel=$("#imp-room");
      rsel.innerHTML=rooms.map(r=>`<option>${esc(r)}</option>`).join("");
      const updatePreview=()=>{
        const selRoom=rsel.value;
        importItems=items.filter(i=>(i.room||i.room_tag||"General")===selRoom);
        $("#imp-preview").innerHTML=`<div style="font-size:13px"><b>${importItems.length}</b> items from <b>${esc(selRoom)}</b> will be imported.</div>`;
        $("#imp-go").disabled=!importItems.length;
      };
      rsel.onchange=updatePreview;
      updatePreview();
    }
  };
  $("#imp-go").onclick=()=>{
    if(!importItems.length) return;
    importItems.forEach(it=>{
      G.rows.push({id:G.uid++,room:it.room||it.room_tag||"General",cat:it.category||"",item:it.item_name||it.description||"",unit:it.uom||"",rate:Number(it.rate)||0,originalRate:Number(it.rate)||0,w:Number(it.width)||0,h:Number(it.height)||0,qty:Number(it.qty)||0,amount:(Number(it.rate)||0)*(Number(it.qty)||0),remarks:it.remarks||"",custom:!!it.is_custom,cost:Number(it.cost_rate)||0,scope:(it.scope==='excluded'||it.scope==='optional')?it.scope:'included',stream:normStream(it.stream||classifyStream(it.category)),lineDisc:Number(it.line_disc_pct)||0});
    });
    G.dirty=true; closeModal(); gReRenderEst();
    toast("Imported "+importItems.length+" items");
  };
}

function gRates(p){
  const b=$("#gBody"); const cats=[...new Set(G.rates.map(r=>r.cat))];
  b.innerHTML=`<div class="pw-card">
    <div class="mrcbar"><input id="rsearch" placeholder="Search items…" class="lf-in" style="max-width:240px">
      <select id="rfilter" class="lf-sel"><option value="">All categories</option>${cats.map(c=>`<option>${esc(c)}</option>`).join("")}</select></div>
    <div class="table-wrap" style="margin-top:12px"><table><thead><tr><th>Category</th><th>Section</th><th>Item</th><th>Unit</th><th>Rate ₹</th>${canWrite()?'<th></th>':''}</tr></thead><tbody id="rbody"></tbody></table></div>
    <div class="hint">Editing a rate updates the shared library for future items. Existing line items keep their rate.</div>
  </div>
  ${canWrite()?`<div class="pw-card" style="background:#FBF5E6;border-color:#D4B06A">
    <div class="sec-label" style="color:var(--brass-deep);border:none;padding-top:0">Add new item to library</div>
    <div class="addgrid">
      <div class="field"><label>Category</label><input id="rl-cat" list="rlcatdl" placeholder="Carpentry"><datalist id="rlcatdl">${cats.map(c=>`<option value="${esc(c)}">`).join("")}</datalist></div>
      <div class="field" style="flex:2"><label>Item name</label><input id="rl-item" placeholder="Wardrobe with laminate finish"></div>
      <div class="field"><label>Unit</label><input id="rl-unit" placeholder="sqft" value="sqft"></div>
      <div class="field"><label>Rate ₹</label><input id="rl-rate" type="number" placeholder="850"></div>
      <button class="primary" id="rl-add">+ Add to library</button>
    </div>
  </div>`:''}`; 
  const draw=()=>{
    const q=($("#rsearch").value||'').toLowerCase(), fc=$("#rfilter").value;
    const rows=G.rates.filter(r=>(!fc||r.cat===fc)&&(!q||r.item.toLowerCase().includes(q)||r.cat.toLowerCase().includes(q)));
    $("#rbody").innerHTML=rows.map(r=>`<tr><td><span class="tg">${esc(r.cat)}</span></td><td style="font-size:11px;color:var(--ink-soft)">${esc(STREAM_LABEL[normStream(r.stream||classifyStream(r.cat))])}</td><td>${esc(r.item)}</td><td>${esc(r.unit)}</td><td>${canWrite()?`<input class="ii" style="width:90px" type="number" value="${r.rate}" data-rid="${r.id}">`:gFmt(r.rate)}</td>${canWrite()?`<td><button class="linkbtn del" data-rldel="${r.id}">×</button></td>`:''}</tr>`).join("")||'<tr><td colspan="6" class="empty">No items match</td></tr>';
    if(canWrite()){
      $$("#rbody [data-rid]").forEach(inp=>inp.onchange=async()=>{ const nr=parseFloat(inp.value)||0; const rid=inp.dataset.rid; await sb.from("rate_library").update({rate:nr}).eq("id",rid); const rr=G.rates.find(x=>x.id==rid); if(rr)rr.rate=nr; toast("Rate updated"); });
      $$("#rbody [data-rldel]").forEach(btn=>btn.onclick=async()=>{ if(!confirm("Remove this item from the library?")) return; await sb.from("rate_library").update({is_active:false}).eq("id",btn.dataset.rldel); G.rates=G.rates.filter(x=>x.id!=btn.dataset.rldel); draw(); toast("Removed from library"); });
    }
  };
  $("#rsearch").oninput=draw; $("#rfilter").onchange=draw; draw();
  if(canWrite()&&$("#rl-add")) $("#rl-add").onclick=async()=>{
    const cat=$("#rl-cat").value.trim(), item=$("#rl-item").value.trim(), unit=$("#rl-unit").value.trim()||'nos', rate=parseFloat($("#rl-rate").value)||0;
    if(!cat||!item) return toast("Category and Item name needed");
    if(G.rates.find(r=>r.item===item&&r.cat===cat)) return toast("This item already exists in the library");
    const stream=classifyStream(cat);
    const {data,error}=await sb.from("rate_library").insert({category:cat,item,uom:unit,rate,is_active:true,stream:stream}).select().single();
    if(error) return toast(error.message);
    G.rates.push({cat,item,unit,rate,cost:0,id:data.id,stream:stream});
    ["rl-cat","rl-item","rl-unit","rl-rate"].forEach(i=>$("#"+i).value=''); $("#rl-unit").value='sqft';
    draw(); toast("Added to library: "+item);
  };
}

/* ================= SAVE / CSV ================= */
async function gSave(p, silent){
  if(!G.boqId) return;
  // Locked BOQ (shared with client + 10% received): only Amit may write.
  // Postgres enforces this anyway (boq_lock_guard); this just avoids firing
  // doomed round-trips — especially from the 5s autosave.
  if(!gCanEdit()){
    gStopAutosave();
    if(!silent) toast("This BOQ is locked — only Amit can edit it. Use “New revision” to quote changes.");
    return;
  }
  if(G._saving) return; // prevent overlapping saves
  G._saving=true;
  const v=G.ver||{};
  // auto-generate a version label with date+time if none set
  if(!v.version_label){
    const d=new Date();
    v.version_label="v"+d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    G.ver=v;
    const vl=$("#m-version"); if(vl) vl.value=v.version_label;
  }
  const grand=gGrand();   // legacy fee/gst/disc/boost_pct columns are no longer written (BOQ-STREAMS-02)
  try{
    const {error:vErr}=await sb.from("boq_versions").update({
      client_name:v.client_name,client_phone:v.client_phone,client_email:v.client_email,project_name:v.project_name,property:v.property,
      quote_date:v.quote_date||null,
      stream_settings:(G.ver&&G.ver.stream_settings)||{},
      consultant:v.consultant,consultant_phone:v.consultant_phone,validity_date:v.validity_date||null,version_label:v.version_label,
      // total = client-facing grand (discounts + GST, excluded/optional out) — same number as
      // projects.contract_value below; the recalc_boq_total trigger that overwrote it is dropped
      total:grand.total, last_edited_by:me.id, last_edited_at:new Date().toISOString()
    }).eq("id",G.boqId);
    if(vErr) throw vErr;
    // replace items atomically via RPC — a mid-save failure can no longer wipe the sheet
    const payload=G.rows.map((r,i)=>({room:r.room,category:r.cat,item_name:r.item,description:r.item,uom:r.unit||'nos',rate:r.rate,qty:r.qty,cost_rate:(r.cost==null?0:Number(r.cost)||0),width:r.w||null,height:r.h||null,remarks:r.remarks||null,is_custom:r.custom,sort_idx:i,room_tag:r.room,scope:gScope(r),stream:rowStream(r),line_disc_pct:(rowStream(r)===FURNISHING?(Number(r.lineDisc)||0):0)}));
    const {error:iErr}=await sb.rpc("boq_replace_items",{p_version_id:G.boqId,p_items:payload});
    if(iErr) throw iErr;
    if(G.projectId){
      const {error:pErr}=await sb.from("projects").update({contract_value:grand.total}).eq("id",G.projectId);
      if(pErr) throw pErr;
    }
    G.dirty=false;
    // update the autosave indicator
    const ind=$("#g-autosave"); if(ind){ ind.textContent="✓ Saved "+new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}); ind.style.color="var(--green)"; }
    if(!silent){
      toast("BOQ saved");
      // log to activity (lead or project)
      gLogActivity(p, "BOQ saved · "+v.version_label);
      // an edit to a locked BOQ is an admin override — make it visible in the trail
      if(gLocked() && isBoqAdmin()) gLogActivity(p, "⚠ Locked BOQ edited by admin · "+v.version_label);
    }
    if(G.leadId && typeof refreshLeadBoqFlow==="function" && !silent) refreshLeadBoqFlow();
  }catch(e){
    const locked=/BOQ_LOCKED/.test(e.message||"");
    const msg=locked?"BOQ is locked — only Amit can edit it":(e.message||"error");
    if(locked) gStopAutosave();
    const ind=$("#g-autosave"); if(ind){ ind.textContent="⚠ Not saved — "+msg; ind.style.color="#d9534f"; }
    if(!silent) toast(locked?msg+". Use “New revision” to quote changes.":("Save failed: "+msg));
  }finally{ G._saving=false; }
}

// log BOQ activity to the right timeline (lead_activities or project)
async function gLogActivity(p, text){
  try{
    // Project BOQs have no G.leadId, but their project points at a lead — log
    // there so share / revision / admin-override events land in one trail.
    const leadId = G.leadId || (p && p.lead_id) || null;
    if(leadId){
      await sb.from("lead_activities").insert({lead_id:leadId,type:"Note",text:text,by_user:me.id});
    }
  }catch(e){}
}

// ── Autosave: every 5 seconds if there are unsaved changes ──
function gStartAutosave(p){
  gStopAutosave();
  G._autosaveTimer=setInterval(()=>{
    if(G.dirty && G.boqId && !G._saving){ gSave(p, true); }
  }, 5000);
}
function gStopAutosave(){ if(G._autosaveTimer){ clearInterval(G._autosaveTimer); G._autosaveTimer=null; } }
function gExportCSV(){
  if(!G.rows.length) return toast("No items to export");
  const g=gGrand();
  let csv='Section,Room,Category,Item,Unit,Rate,W,H,Qty,Disc%,Amount,Remarks,Scope\n';
  gActiveStreams().forEach(st=>{
    const fin=gStreamFin(st), cfg=fin.cfg, label=STREAM_LABEL[st];
    G.rows.filter(r=>rowStream(r)===st).forEach(r=>{
      csv+=`"${label}","${r.room}","${r.cat}","${r.item}","${r.unit}",${r.originalRate},${r.w||''},${r.h||''},${r.qty},${gLineDisc(r)||''},${gBoosted(r)},"${(r.remarks||'').replace(/"/g,'""')}","${gScope(r)}"\n`;
    });
    csv+=`\n,,,,,,,,,,Work subtotal — ${label},${Math.round(fin.subM)}`;
    csv+=`\n,,,,,,,,,,Design Fee (${cfg.fee}%),${Math.round(fin.fee)}`;
    if(cfg.disc>0) csv+=`\n,,,,,,,,,,Discount (${cfg.disc}%),-${Math.round(fin.disc)}`;
    csv+=`\n,,,,,,,,,,GST (${cfg.gst}%),${Math.round(fin.gst)}`;
    csv+=`\n,,,,,,,,,,${label} TOTAL,${Math.round(fin.total)}\n`;
  });
  csv+=`\n,,,,,,,,,,GRAND — Work subtotal,${Math.round(g.subM)}`;
  csv+=`\n,,,,,,,,,,GRAND — Design fee,${Math.round(g.fee)}`;
  if(g.disc>0) csv+=`\n,,,,,,,,,,GRAND — Discount,-${Math.round(g.disc)}`;
  csv+=`\n,,,,,,,,,,GRAND — GST,${Math.round(g.gst)}`;
  csv+=`\n,,,,,,,,,,GRAND TOTAL,${Math.round(g.total)}`;
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='Lintel_BOQ_'+((G.ver?.client_name)||'Client').replace(/\s/g,'_')+'.csv'; a.click();
}

/* ---- PWA: register the same-origin service worker (sw.js) ----
   Real file (not a blob URL, which browsers reject), so it actually registers and
   auto-updates. When a new version activates it claims the page and we reload once,
   so a deploy reaches users without a manual hard refresh. */
(function(){
  if(!("serviceWorker" in navigator)) return;
  // if a controller already exists, a later controllerchange means a NEW version took over — reload once
  let reloading=false;
  if(navigator.serviceWorker.controller){
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(reloading) return; reloading=true; window.location.reload();
    });
  }
  window.addEventListener("load",()=>{
    // updateViaCache:"none" — without it the browser may reuse a cached sw.js for
    // up to 24h and not notice a deploy, which is how a stale build hid the BOQ
    // "Send proposal" button. Always fetch the worker script fresh.
    navigator.serviceWorker.register("/sw.js",{updateViaCache:"none"})
      .then(reg=>{ try{ reg.update(); }catch(_){}
        setInterval(()=>{ try{ reg.update(); }catch(_){} }, 15*60*1000); })  // re-check while a long session stays open
      .catch(()=>{});
  });
})();

/* ---- Build stamp -----------------------------------------------------------
   Bump APP_BUILD on every deploy. Shown in the header so "is my browser on the
   current build?" is answerable without guesswork — a stale service worker once
   hid a whole feature and cost an afternoon of hunting. */
const APP_BUILD = "b10 · 20 Jul 2026";
(function(){
  const t=document.getElementById("buildTag");
  if(t) t.textContent=APP_BUILD;
})();

/* ---- PWA install button: shows when the browser offers installation ---- */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault(); deferredPrompt=e;
  // show a small install chip in the top bar if present
  const host=document.querySelector("nav.tabs")||document.body;
  if(document.getElementById("pwaInstall")) return;
  const btn=document.createElement("button");
  btn.id="pwaInstall"; btn.textContent="⤓ Install app";
  btn.style.cssText="margin-left:auto;padding:6px 12px;border:1px solid var(--brass,#DFB05E);background:transparent;color:var(--brass,#DFB05E);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer";
  btn.onclick=async()=>{ if(!deferredPrompt)return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; btn.remove(); };
  host.appendChild(btn);
});
