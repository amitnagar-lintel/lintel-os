<style>
  /* ---- Lintel OS · drafting-sheet design system -------------------- */
  :root{
    --paper:#F4EFE6; --paper-2:#ECE4D6; --ink:#0D0D27; --ink-soft:#565571;
    --line:#DDD3C1; --line-2:#CFC4AD; --brass:#DFB05E; --brass-deep:#B08433;
    --navy:#0D0D27; --navy-soft:#1C1C3A;
    --slate:#565571; --green:#4F7D52; --clay:#A4503E; --blue:#5B86B3;
    --new:#7C8DA0; --contacted:#5B86B3; --qualified:#B08433;
    --quoted:#DFB05E; --won:#4F7D52; --lost:#A4503E;
    --radius:10px; --shadow:0 1px 2px rgba(13,13,39,.06),0 8px 24px rgba(13,13,39,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:14px;line-height:1.5}
  .mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
  .display{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--brass-deep)}

  /* ---- login ------------------------------------------------------- */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% -10%,#fff 0%,var(--paper) 55%)}
  .login-card{width:min(420px,90vw);text-align:center;padding:48px 40px}
  .mark{font-family:'Bricolage Grotesque';font-weight:700;font-size:13px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--brass-deep)}
  .login-card h1{font-family:'Bricolage Grotesque';font-weight:600;font-size:34px;margin:18px 0 6px;letter-spacing:-.02em}
  .login-card p{color:var(--ink-soft);margin:0 0 30px}
  .gbtn{display:inline-flex;gap:10px;align-items:center;justify-content:center;width:100%;
    padding:13px 18px;background:var(--ink);color:var(--paper);border:none;border-radius:var(--radius);
    font-weight:600;font-size:15px;transition:transform .12s ease,opacity .12s}
  .gbtn:hover{transform:translateY(-1px)}
  .login-note{margin-top:18px;font-size:12px;color:var(--ink-soft)}
  .rule{height:1px;background:var(--line);margin:30px 0}
  .blueprint-line{position:absolute;left:0;right:0;height:1px;background:var(--line);opacity:.6}

  /* ---- shell ------------------------------------------------------- */
  #app{display:none;min-height:100%;flex-direction:column}
  header.top{display:flex;align-items:center;gap:24px;padding:0 26px;height:62px;
    border-bottom:1px solid var(--line);background:rgba(250,248,244,.85);backdrop-filter:blur(8px);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:10px}
  .logo-mark{height:30px;width:auto;flex:none}
  .login-logo{width:96px;height:auto;margin:0 auto 14px;display:block}
  .brand-word{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:.005em;color:var(--navy)}
  .brand-os{color:var(--brass-deep);margin-left:1px}
  .brand-serif{font-family:'Fraunces',serif;font-weight:600;font-size:34px;margin:8px 0 6px;letter-spacing:-.01em;color:var(--navy)}
  nav.tabs{display:flex;gap:4px;margin-left:14px}
  nav.tabs button{border:none;background:none;padding:8px 14px;border-radius:8px;font-weight:600;
    color:var(--ink-soft);font-size:13.5px}
  nav.tabs button.active{background:var(--paper-2);color:var(--ink)}
  .spacer{flex:1}
  .who{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft)}
  .role-chip{font-family:'IBM Plex Mono';font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    padding:3px 8px;border:1px solid var(--line-2);border-radius:20px;color:var(--slate)}
  .ghost{border:1px solid var(--line-2);background:none;padding:7px 13px;border-radius:8px;color:var(--ink);font-weight:500}
  .ghost:hover{background:var(--paper-2)}
  main{flex:1;padding:26px;max-width:1320px;width:100%;margin:0 auto}
  .view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap}
  .view-head h2{font-family:'Bricolage Grotesque';font-weight:600;font-size:26px;margin:0;letter-spacing:-.02em}
  .view-head .sub{color:var(--ink-soft);font-size:13px;margin-top:3px}
  .primary{background:var(--brass);color:var(--navy);border:none;padding:10px 16px;border-radius:9px;font-weight:600;box-shadow:var(--shadow)}
  .primary:hover{background:var(--brass-deep);color:var(--navy)}
  .primary:disabled{opacity:.4;cursor:not-allowed}
  button:focus-visible,a:focus-visible{outline:2px solid var(--brass-deep);outline-offset:2px}

  /* ---- kanban ------------------------------------------------------ */
  .board{display:grid;grid-template-columns:repeat(6,minmax(180px,1fr));gap:14px;align-items:start;overflow-x:auto;padding-bottom:8px}
  .col{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:120px}
  .col-h{display:flex;align-items:center;gap:7px;padding:4px 6px 10px;font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em}
  .dot{width:8px;height:8px;border-radius:50%}
  .col-count{margin-left:auto;font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft)}
  .card{background:#fff;border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:9px;box-shadow:0 1px 1px rgba(28,26,23,.03);cursor:pointer;transition:border-color .12s,transform .12s}
  .card:hover{border-color:var(--brass);transform:translateY(-1px)}
  .card .nm{font-weight:600;font-size:13.5px}
  .card .meta{color:var(--ink-soft);font-size:12px;margin-top:3px}
  .card .row2{display:flex;align-items:center;gap:8px;margin-top:9px}
  .bant{font-family:'IBM Plex Mono';font-size:11px;padding:2px 6px;border-radius:5px;background:var(--paper-2);color:var(--slate)}
  .bant.hi{background:#E7F0E8;color:var(--green)} .bant.lo{background:#F6E7E3;color:var(--clay)}
  .val{margin-left:auto;font-family:'IBM Plex Mono';font-size:12px;font-weight:500}

  /* ---- tables ------------------------------------------------------ */
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--paper-2)}
  td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13.5px}
  tr:last-child td{border-bottom:none}
  tr.clickable:hover td{background:var(--paper-2);cursor:pointer}
  .num{font-family:'IBM Plex Mono';text-align:right;font-variant-numeric:tabular-nums}
  .pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
  .pill.active{background:#E7F0E8;color:var(--green)} .pill.draft{background:var(--paper-2);color:var(--slate)}

/* ===================== SPEED-TO-LEAD (S2L) ===================== */
const S2L = {
  SLA_MIN: 15,                          // 15-min first-call SLA (business hours)
  CADENCE_DAYS: [0,0,1,3,5,10],         // day-offset for touch 1..6, relative to lead_created_at
  BIZ: { startMin:9*60+30, endMin:19*60, days:[1,2,3,4,5,6] }, // Mon–Sat 09:30–19:00 (browser local = IST)
  OUTCOMES: [["connected","Connected"],["no_answer","No answer"],["busy","Busy"],["switched_off","Switched off"]],
  STATUS: [["","— Open —"],["meeting_done","Meeting done"],["possession_delay","Possession delay"],["not_responding","Not responding"]],
};
function s2lBizOpen(d){
  if(!S2L.BIZ.days.includes(d.getDay())) return false;
  const mins=d.getHours()*60+d.getMinutes();
  return mins>=S2L.BIZ.startMin && mins<S2L.BIZ.endMin;
}
// SLA deadline = lead_created_at + 15 min, only meaningful when the lead arrived in business hours
function s2lSlaDeadline(l){
  if(!l.lead_created_at) return null;
  const created=new Date(l.lead_created_at);
  if(!s2lBizOpen(created)) return null;   // arrived after hours → morning queue, no live countdown
  return new Date(created.getTime()+S2L.SLA_MIN*60000);
}
function s2lSlaState(l){
  if(l.first_call_at) return {state:"done"};
  if(!l.lead_created_at) return {state:"none"};
  const dl=s2lSlaDeadline(l);
  if(!dl) return {state:"queued"};
  const ms=dl.getTime()-Date.now();
  if(l.sla_breached || ms<=0) return {state:"red", ms};
  if(ms<=10*60000) return {state:"amber", ms};
  return {state:"green", ms};
}
function s2lFmtMs(ms){ const s=Math.max(0,Math.floor(ms/1000)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function s2lSlaChipHtml(l){
  const st=s2lSlaState(l);
  if(st.state==="done"||st.state==="none") return "";
  if(st.state==="queued") return `<span class="s2l-chip s2l-queued" title="Arrived outside business hours — in the 09:00 call queue">⏱ Queued 09:00</span>`;
  const cls=st.state==="red"?"s2l-red":st.state==="amber"?"s2l-amber":"s2l-green";
  const dl=s2lSlaDeadline(l);
  const label=st.state==="red"?"SLA breached":("Call due "+s2lFmtMs(st.ms));
  return `<span class="s2l-chip ${cls}" data-s2l-sla data-deadline="${dl?dl.getTime():0}">⏱ ${label}</span>`;
}
function s2lTouchDotsHtml(l){
  const tc=Math.min(6,Number(l.touch_count)||0); let dots="";
  for(let i=1;i<=6;i++){ dots+=`<span class="s2l-dot ${i<=tc?'on':(i===tc+1?'next':'')}"></span>`; }
  return `<span class="s2l-dots" title="${tc}/6 touches completed">${dots}</span>`;
}
function s2lDupBadgeHtml(l){
  return l.is_duplicate?`<span class="s2l-dup" title="Agency duplicate — excluded from conversion metrics">Agency duplicate</span>`:"";
}
// next_touch_due after advancing to `count` completed touches (null once cadence is done)
function s2lNextTouchDue(l,count){
  if(count>=6 || !l.lead_created_at) return null;
  const d=new Date(l.lead_created_at); d.setDate(d.getDate()+S2L.CADENCE_DAYS[count]);
  return d.toISOString();
}
// one shared 1s ticker keeps every live SLA chip counting down
let _s2lTick=null;
function s2lStartTicker(){
  if(_s2lTick) return;
  _s2lTick=setInterval(()=>{
    document.querySelectorAll("[data-s2l-sla]").forEach(c=>{
      const ms=(Number(c.dataset.deadline)||0)-Date.now();
      if(ms<=0){ c.textContent="⏱ SLA breached"; c.classList.remove("s2l-green","s2l-amber"); c.classList.add("s2l-red"); }
      else { c.textContent="⏱ Call due "+s2lFmtMs(ms); c.classList.remove("s2l-red"); c.classList.toggle("s2l-amber",ms<=10*60000); c.classList.toggle("s2l-green",ms>10*60000); }
    });
  },1000);
}
// Log-call quick action: insert a touch, stamp first_call_at, advance the cadence
async function s2lLogCall(l){
  if(!canWrite()) return;
  const next=Math.min(6,(Number(l.touch_count)||0)+1);
  openModal(`
    <div class="modal-h">Log a call · ${esc(l.name||"")}</div>
    <div class="modal-b">
      <div class="field"><label>Outcome</label>
        <select id="s2l_outcome" class="lf-sel" style="width:100%">${S2L.OUTCOMES.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join("")}</select></div>
      <div class="field"><label>Note (optional)</label><textarea id="s2l_note" rows="3" style="width:100%" placeholder="What happened on the call"></textarea></div>
      <div class="s2l-hint">Touch ${next} of 6${l.first_call_at?"":" · logged as the first call"}</div>
    </div>
    <div class="modal-f"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" id="s2l_save">Log call</button></div>`);
  $("#s2l_save").onclick=async()=>{
    const outcome=$("#s2l_outcome").value, note=$("#s2l_note").value.trim()||null;
    const newCount=(Number(l.touch_count)||0)+1, now=new Date().toISOString();
    const {error:tErr}=await sb.from("lead_touches").insert({lead_id:l.id,touch_number:newCount,channel:"call",outcome,notes:note,touched_by:(me&&me.email)||null});
    if(tErr) return toast(tErr.message);
    const upd={ touch_count:newCount, last_touch_at:now, next_touch_due:s2lNextTouchDue(l,newCount), updated_at:now };
    if(!l.first_call_at) upd.first_call_at=now;
    const {error:uErr}=await sb.from("leads").update(upd).eq("id",l.id);
    if(uErr) return toast(uErr.message);
    await sb.from("lead_activities").insert({lead_id:l.id,type:"Call",text:`Call logged · ${(S2L.OUTCOMES.find(o=>o[0]===outcome)||["",outcome])[1]}${note?" · "+note:""}`,by_user:me.id});
    Object.assign(l,upd);
    closeModal(); toast("Call logged");
    if(activeLead===l.id) renderLeadWorkspace(l.id);
    else if($("#dashS2lCalls")) renderDashboard();
    else drawLeadsView();
  };
}

async function enter(session){
  if (window.__entered) return; window.__entered = true;
  try {
    const email = session.user.email || "";
    if (!email.endsWith("@"+ALLOWED_DOMAIN)) {
      await sb.auth.signOut();
      alert("Lintel OS is restricted to @"+ALLOWED_DOMAIN+" accounts.");
      return location.reload();
    }
    me = session.user;
    let prof = null;
    try { const r = await sb.from("profiles").select("role,full_name").eq("id",me.id).single(); prof = r.data; } catch(e){}
    myRole = prof?.role || "interior_designer";
    myName = prof?.full_name || email.split("@")[0];
    myAvatar = (me.user_metadata && me.user_metadata.avatar_url) || "";
    $("#login").style.display="none";
    $("#app").style.display="flex";
    $("#userName").textContent = prof?.full_name || email.split("@")[0];
    $("#userRole").textContent = myRole.replace("_"," ");
    if(canManageStaff()) $("#navTeam").style.display="";
    document.querySelectorAll("nav.tabs button").forEach(b=>{
      if(b.dataset.external) return;
      b.onclick=()=>{ document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.remove("active"));
        b.classList.add("active"); activeLead=null; activeProject=null; if(typeof gStopAutosave==="function")gStopAutosave(); render(b.dataset.view); };
    });
    render("dashboard");
  } catch(e) {
    window.__entered = false;
    const el=$("#loginErr"); if(el){ el.style.display="block"; el.textContent="Could not load workspace: "+(e&&e.message?e.message:"unknown")+". Refresh and try again."; }
    const b=$("#signinBtn"); if(b){ b.disabled=false; b.textContent="Sign in"; }
  }
}

function waNumber(phone){
  let d=String(phone||"").replace(/[^0-9]/g,"");
  if(!d) return "";
  if(d.length===10) d="91"+d;                 // bare Indian mobile -> add country code
  else if(d.length===11&&d.startsWith("0")) d="91"+d.slice(1);
  else if(d.length>12&&d.startsWith("91")) d=d.slice(0,12);
  return d;
}

function staffNameByProfile(uid){

/* short display date for ISO strings: "2026-07-15" → "15 Jul" (falls back to "—") */
function dShort(iso){ if(!iso) return "—"; const d=new Date(iso); return isNaN(d)?esc(String(iso)):d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}); }
/* normalize budget bands for display: "₹_7_to_₹_15_lakhs" → "₹7–15 L"; clean values pass through */
function fmtBand(b){
  if(!b) return "";
  const s=String(b).replace(/_/g," ").replace(/\s+/g," ").trim();
  const m=s.match(/^₹\s*(\d+(?:\.\d+)?)\s*to\s*₹\s*(\d+(?:\.\d+)?)\s*lakhs?$/i);
  return m?`₹${m[1]}–${m[2]} L`:s;
}

async function drawLeadsTable(){
  const host=$("#board"); if(!host) return;
  host.className="lead-table-wrap";
  const {data:leads,error}=await sb.from("leads").select("*").order("updated_at",{ascending:false});
  if(error){host.innerHTML=`<div class="empty">${esc(error.message)}</div>`;return;}
  const {data:projs}=await sb.from("projects").select("id,code,name,lead_id");
  const projByLead={}; (projs||[]).forEach(pr=>{ if(pr.lead_id) projByLead[pr.lead_id]=pr; });
  const f=leadFilters, q=f.search.toLowerCase();
  const rows=(leads||[]).filter(l=>{
    if(q && !(`${l.name} ${l.phone||""} ${l.email||""} ${l.locality||""} ${l.site_address||""}`.toLowerCase().includes(q))) return false;
    if(f.source && l.source!==f.source) return false;
    if(f.owner==="__none__"){ if(l.consultant_id||l.designer_id||l.pm_id||l.presales_id) return false; }
    else if(f.owner && ![l.consultant_id,l.designer_id,l.pm_id,l.presales_id].map(String).includes(String(f.owner))) return false;
    if(f.tag && !(l.tags||[]).includes(f.tag)) return false;
    if(f.dupOnly && !l.is_duplicate) return false;
    if(f.dueOnly && (!l.next_follow_up || l.next_follow_up>todayISO())) return false;
    return true;
  });

async function drawBoard(){

  if(error){board.innerHTML=`<div class="empty">${esc(error.message)}</div>`;return;}
  // fetch projects to link won leads to their converted project
  const {data:projs}=await sb.from("projects").select("id,code,name,lead_id");
  const projByLead={}; (projs||[]).forEach(pr=>{ if(pr.lead_id) projByLead[pr.lead_id]=pr; });
  const f=leadFilters, q=f.search.toLowerCase();
  const filtered=(leads||[]).filter(l=>{
    if(q && !(`${l.name} ${l.phone||""} ${l.locality||""} ${l.site_address||""}`.toLowerCase().includes(q))) return false;
    if(f.source && l.source!==f.source) return false;
    if(f.owner==="__none__"){ if(l.consultant_id||l.designer_id||l.pm_id||l.presales_id) return false; }
    else if(f.owner && ![l.consultant_id,l.designer_id,l.pm_id,l.presales_id].map(String).includes(String(f.owner))) return false;
    if(f.tag && !(l.tags||[]).includes(f.tag)) return false;
    if(f.dupOnly && !l.is_duplicate) return false;
    if(f.dueOnly && (!l.next_follow_up || l.next_follow_up>todayISO())) return false;
    return true;
  });
  board.innerHTML="";
  const dueN=(leads||[]).filter(l=>l.next_follow_up && l.next_follow_up<=todayISO() && l.stage!=="won" && l.stage!=="lost").length;
  const badge=$("#dueCount"); if(badge) badge.textContent=dueN?dueN:"";
  if(badge) badge.style.display=dueN?"inline-flex":"none";
  STAGES.forEach(([key,label,color])=>{
    const items=filtered.filter(l=>l.stage===key);

        const pr=projByLead[l.id];
        const c=document.createElement("div");c.className="card card-won";
        c.innerHTML=`<div class="nm">${esc(l.name)}</div>
          <div class="meta">${pr?`✓ Converted → <b>${esc(pr.code||pr.name)}</b>`:"✓ Won"}</div>
          ${pr?`<div class="row2"><span class="linkbtn">Open project →</span></div>`:""}`;
        c.onclick=()=>{
          if(pr){ activeProject=pr.id; projectTab="overview"; activeLead=null; render("projects"); document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.toggle("active",x.dataset.view==="projects")); setTimeout(()=>renderProjectWorkspace(pr.id),60); }
          else openLead(l.id);
        };
        col.appendChild(c);
        return;
      }
      const score=l.bant_score||bantFromQual(l);
      const sCls=score>=60?"hi":score<35?"lo":"";
      const dc=dueClass(l.next_follow_up);
      const c=document.createElement("div");c.className="card";
      c.innerHTML=`<div class="nm">${esc(l.name)}${l.phone?`<button class="card-wa" title="WhatsApp">‎🟢 WA</button>`:""}</div>
        <div class="meta">${esc(l.locality||l.city||"")}${l.project_type?" · "+esc(l.project_type):""}</div>
        ${(l.tags&&l.tags.length)?`<div class="tagrow">${l.tags.slice(0,3).map(t=>`<span class="tg">${esc(t)}</span>`).join("")}</div>`:""}
        ${(s2lSlaChipHtml(l)||s2lDupBadgeHtml(l))?`<div class="s2l-row" style="margin:6px 0 2px">${s2lSlaChipHtml(l)} ${s2lDupBadgeHtml(l)}</div>`:""}

        ${l.next_follow_up?`<span class="fu ${dc}">⏱ ${l.next_follow_up.slice(5)}</span>`:""}

/* ---- Duplicate contact check: same phone or email elsewhere in leads/projects ---- */
async function findDuplicateContact(phone,email,excludeLeadId){
  const normPh=(phone||"").replace(/\D/g,"").slice(-10);
  const normEm=(email||"").trim().toLowerCase();
  if(!normPh && !normEm) return null;
  // check leads
  let q=sb.from("leads").select("id,name,phone,email,stage");
  const {data:allLeads}=await q;
  const leadHit=(allLeads||[]).find(x=>{
    if(excludeLeadId && x.id===excludeLeadId) return false;
    const xp=(x.phone||"").replace(/\D/g,"").slice(-10);
    const xe=(x.email||"").trim().toLowerCase();
    return (normPh && xp && xp===normPh) || (normEm && xe && xe===normEm);
  });
  if(leadHit) return {type:"lead",record:leadHit};
  // check projects (converted clients)
  const {data:allProj}=await sb.from("projects").select("id,name,code,client_phone,client_email");
  const projHit=(allProj||[]).find(x=>{
    const xp=(x.client_phone||"").replace(/\D/g,"").slice(-10);
    const xe=(x.client_email||"").trim().toLowerCase();
    return (normPh && xp && xp===normPh) || (normEm && xe && xe===normEm);
  });
  if(projHit) return {type:"project",record:projHit};
  return null;
}

function confirmDuplicateModal(dupe){
  return new Promise(resolve=>{
    const label=dupe.type==="lead"
      ? `an existing lead — <b>${esc(dupe.record.name)}</b> (${esc((STAGES.find(s=>s[0]===dupe.record.stage)||["",dupe.record.stage])[1])})`
      : `an existing project — <b>${esc(dupe.record.name)}</b> (${esc(dupe.record.code||"")})`;
    openModal(`
      <div class="modal-h">⚠ Possible duplicate</div>
      <div class="modal-b">
        <div class="banner" style="background:#FBF1ED;border-color:#B45844">This phone number or email matches ${label}.</div>
        <div style="font-size:13px;color:var(--ink-soft)">Do you want to open that record instead, or continue creating this one anyway (e.g. a family member sharing a number)?</div>
      </div>
      <div class="modal-f">
        <button class="ghost" id="dup_cancel">Cancel</button>
        <button class="ghost" id="dup_open">Open existing</button>
        <button class="primary" id="dup_continue">Continue anyway</button>
      </div>`);
    $("#dup_cancel").onclick=()=>{ closeModal(); resolve(false); };
    $("#dup_continue").onclick=()=>{ closeModal(); resolve(true); };
    $("#dup_open").onclick=()=>{
      closeModal(); resolve(false);
      if(dupe.type==="lead"){ openLead(dupe.record.id); }
      else { activeProject=dupe.record.id; projectTab="overview"; render("projects"); document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.toggle("active",x.dataset.view==="projects")); setTimeout(()=>renderProjectWorkspace(dupe.record.id),60); }
    };
  });
}

async function saveLeadRow(row,lead){
    let res, newId;
    if(lead) res=await sb.from("leads").update(row).eq("id",lead.id);
    else { row.owner_id=me.id; res=await sb.from("leads").insert(row).select().single(); newId=res.data&&res.data.id; }

    if(!lead && newId) await sb.from("lead_activities").insert({lead_id:newId,type:"created",text:"Lead added via "+(row.source||"—"),by_user:me.id});
    closeModal(); toast(lead?"Lead updated":"Lead created");

}

/* ---- shared handlers across lead tabs ---- */
function bindLeadCommon(l){
  if(!canWrite()) return;
  const ed=$("#dEdit"); if(ed) ed.onclick=()=>leadForm(l);
  const cv=$("#dConv"); if(cv) cv.onclick=()=>convertLead(l);
  const sd=$("#ld_stage");
  if(sd) sd.onchange=async()=>{
    const newStage=sd.value, oldLabel=(STAGES.find(s=>s[0]===l.stage)||["",l.stage])[1], newLabel=(STAGES.find(s=>s[0]===newStage)||["",newStage])[1];
    // Won → trigger conversion flow (assign team, then convert). Don't just flip the stage.
    if(newStage==="won" && l.stage!=="won"){
      sd.value=l.stage; // revert visual until conversion confirmed
      convertLead(l);
      return;
    }
    const {error}=await sb.from("leads").update({stage:newStage,updated_at:new Date().toISOString()}).eq("id",l.id);
    if(error){ sd.value=l.stage; return toast(error.message); }
    await sb.from("lead_activities").insert({lead_id:l.id,type:"Note",text:`Stage: ${oldLabel} → ${newLabel}`,by_user:me.id});
    l.stage=newStage; toast("Stage updated"); renderLeadWorkspace(l.id);
  };
  const cd=$("#ld_consultant");
  if(cd) cd.onchange=async()=>{
    const cid=cd.value?Number(cd.value):null;
    const {error}=await sb.from("leads").update({consultant_id:cid,updated_at:new Date().toISOString()}).eq("id",l.id);
    if(error) return toast(error.message);
    await sb.from("lead_activities").insert({lead_id:l.id,type:"Note",text:cid?("Design consultant assigned: "+staffName(cid)):"Design consultant unassigned",by_user:me.id});
    l.consultant_id=cid; toast("Consultant updated");
    if(cid) pingAssignment({lead_id:l.id});
  };
  const setFU=async(iso)=>{
    const {error}=await sb.from("leads").update({next_follow_up:iso}).eq("id",l.id);
    if(error) return toast(error.message);
    await sb.from("lead_activities").insert({lead_id:l.id,type:"Note",text:iso?("Follow-up set for "+iso):"Follow-up cleared",by_user:me.id});
    toast(iso?("Follow-up set: "+iso):"Follow-up cleared");
    l.next_follow_up=iso; renderLeadWorkspace(l.id);
  };
  document.querySelectorAll("[data-fu]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.fu;
    if(v==="clear") return setFU(null);
    const d=new Date(); d.setDate(d.getDate()+Number(v));
    setFU(d.toISOString().slice(0,10));
  });
  const fd=$("#fu_date"); if(fd) fd.onchange=()=>{ if(fd.value) setFU(fd.value); };
  const wl=$("#waLead");
  if(wl) wl.onclick=()=>{
    waOpen(l.phone, waLeadMsg(l));
    logAct(l.id,"WhatsApp","WhatsApp opened · intro message");
  };
  const wle=$("#waLeadEdit");
  if(wle) wle.onclick=()=>{
    openModal(`
      <div class="modal-h">WhatsApp message</div>
      <div class="modal-b">
        <div class="field"><label>To</label><div>${esc(l.name||"")} · +${waNumber(l.phone)}</div></div>
        <div class="field"><label>Message</label><textarea id="wa_text" rows="6" style="width:100%">${esc(waLeadMsg(l))}</textarea></div>
      </div>
      <div class="modal-f"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" id="wa_send">Open in WhatsApp →</button></div>`);
    $("#wa_send").onclick=()=>{ waOpen(l.phone,$("#wa_text").value); closeModal();
      logAct(l.id,"WhatsApp","WhatsApp opened · custom message"); };
  };
  const lc=$("#s2l_logcall"); if(lc) lc.onclick=()=>s2lLogCall(l);
  const ls=$("#ld_lead_status");
  if(ls) ls.onchange=async()=>{
    const v=ls.value||null;
    if(v==="not_responding" && (Number(l.touch_count)||0)<6){ ls.value=l.lead_status||""; return toast("Complete the 6-touch cadence first ("+(Number(l.touch_count)||0)+"/6)"); }
    if(v==="possession_delay"){ ls.value=l.lead_status||""; return s2lPossessionDialog(l); }
    const {error}=await sb.from("leads").update({lead_status:v,updated_at:new Date().toISOString()}).eq("id",l.id);
    if(error){ ls.value=l.lead_status||""; return toast(error.message); }

/* ---- workflow strip: BOQ → Proposal sent → 10% advance → Convert ---- */
async function renderLeadBoqFlow(){
  const {l}=_leadBoqCtx; const host=$("#lboqFlow"); if(!host) return;
  const fresh=(await sb.from("leads").select("*").eq("id",l.id).single()).data||l;
  Object.assign(l,fresh);
  const total=await leadBoqTotal(l);
  const advance=Math.round(total*0.10);
  const hasBoq=total>0;
  const proposalSent=!!l.proposal_sent_at;
  const advancePaid=!!l.advance_paid_at;
  const w=canWrite();
  const step=(n,label,done,active)=>`<div class="wf-step ${done?"done":active?"active":""}">
      <div class="wf-dot">${done?"✓":n}</div><div class="wf-lbl">${label}</div></div>`;
  host.innerHTML=`
    <div class="wf-bar">
      ${step(1,"BOQ ready",hasBoq,!hasBoq)}
      <div class="wf-line ${hasBoq?"on":""}"></div>
      ${step(2,"Proposal sent",proposalSent,hasBoq&&!proposalSent)}
      <div class="wf-line ${proposalSent?"on":""}"></div>
      ${step(3,"10% advance",advancePaid,proposalSent&&!advancePaid)}
      <div class="wf-line ${advancePaid?"on":""}"></div>
      ${step(4,"Convert to project",l.stage==="won",advancePaid&&l.stage!=="won")}

      </div>
      ${w?`<div class="wf-btns">
        <button class="ghost" id="wf_proposal" ${!hasBoq?"disabled":""}>${proposalSent?"✓ Proposal sent":"Mark proposal sent"}</button>
        <button class="ghost" id="wf_advance" ${!proposalSent?"disabled":""}>Share 10% advance</button>
        <button class="ghost" id="wf_advdone" ${!proposalSent?"disabled":""}>${advancePaid?"✓ Advance received":"Mark advance received"}</button>

    await sb.from("leads").update({proposal_sent_at:new Date().toISOString(),stage:"proposal",advance_amount:advance,updated_at:new Date().toISOString()}).eq("id",l.id);

/* ---- BOQ generator on a lead (reuses module G, keyed by lead_id) ---- */
async function leadBoqGenerator(l, host){
  G.projectId=null; G.leadId=l.id;
  if(!G.rates.length){
    const {data}=await sb.from("rate_library").select("*").eq("is_active",true).order("category");
    G.rates=(data||[]).map(r=>({cat:r.category,item:r.item,unit:r.uom,rate:Number(r.rate)||0,cost:Number(r.cost_rate)||0,id:r.id,stream:r.stream||null}));
  }
  const {data:versions}=await sb.from("boq_versions").select("*").eq("lead_id",l.id).order("version",{ascending:false}).order("id",{ascending:false});
  if(!versions||!versions.length){
    host.innerHTML=`<div class="pw-card">${emptyState("No BOQ for this lead yet","Build the BOQ here, then mark the proposal sent above.")}
      ${canWrite()?`<div style="text-align:center"><button class="primary" id="lwNewBoq">+ Start BOQ</button></div>`:""}</div>`;
    if(canWrite()) $("#lwNewBoq").onclick=async()=>{
      const id=await newBoqFor({lead_id:l.id,title:l.name});
      if(!id) return;
      await sb.from("boq_versions").update({client_name:l.name,client_phone:l.phone,client_email:l.email,project_name:l.name,property:l.site_address||l.locality,quote_date:new Date().toISOString().slice(0,10)}).eq("id",id);
      leadBoqGenerator(l,host);
    };
    return;
  }
  G.boqId=versions[0].id; G.ver=versions[0];
  const {data:items}=await sb.from("boq_items").select("*").eq("boq_version_id",G.boqId).order("sort_idx");
  G.rows=(items||[]).map((r,i)=>({
    id:i, dbid:r.id, room:r.room||r.room_tag||"General", cat:r.category||"", item:r.item_name||r.description||"",
    unit:r.uom||"", rate:Number(r.rate)||0, originalRate:Number(r.rate)||0,
    w:Number(r.width)||0, h:Number(r.height)||0, qty:Number(r.qty)||0,
    amount:(Number(r.rate)||0)*(Number(r.qty)||0), remarks:r.remarks||"", custom:!!r.is_custom,
    cost:Number(r.cost_rate)||0,
    scope:(r.scope==='excluded'||r.scope==='optional')?r.scope:'included',
    stream:normStream(r.stream||classifyStream(r.category)), lineDisc:Number(r.line_disc_pct)||0
  }));
  G.uid=G.rows.length;
  gRender(l, host); // generator uses l like a project; gSave guards the project-only write
}

async function newBoqFor(seed){
  if(newBoqFor._busy) return null;
  newBoqFor._busy=true;
  try{
    for(let attempt=0;attempt<2;attempt++){
      // version number per lead/project
      let q=sb.from("boq_versions").select("version").order("version",{ascending:false}).order("id",{ascending:false}).limit(1);
      if(seed.lead_id) q=q.eq("lead_id",seed.lead_id);
      else if(seed.project_id) q=q.eq("project_id",seed.project_id);
      const {data:prev}=await q;
      const version=(prev&&prev[0]?prev[0].version:0)+1;
      const d=new Date();
      const vlabel="v"+d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
      const {data,error}=await sb.from("boq_versions").insert({
        lead_id:seed.lead_id||null, project_id:seed.project_id||null,
        title:seed.title||"New BOQ", version, version_label:vlabel, status:"draft",
        created_by:me.id, last_edited_by:me.id, last_edited_at:new Date().toISOString()
      }).select().single();
      if(error){
        if(error.code==="23505"&&attempt===0) continue; // version taken by a concurrent create — recompute and retry once
        toast(error.message); return null;
      }
      activeBoq=data.id; toast("BOQ created");
      // log creation to lead activity timeline
      if(seed.lead_id){
        try{ await sb.from("lead_activities").insert({lead_id:seed.lead_id,type:"Note",text:"BOQ created · "+vlabel,by_user:me.id}); }catch(e){}
      }
      return data.id;
    }
    return null;
  }finally{ newBoqFor._busy=false; }
}

function boqRow(it){
  const sc=(it.scope==='excluded'||it.scope==='optional')?it.scope:'included';
  const tr=document.createElement("tr");tr.className="boq-row"+(sc==='excluded'?" g-exc":sc==='optional'?" g-opt":"");

  tr.innerHTML=`
    <td><span class="boq-cat">${esc(it.category||"—")}</span>${sc==='excluded'?' <span class="gtag gtag-exc">Excluded</span>':sc==='optional'?' <span class="gtag gtag-opt">Optional</span>':''}</td>
    <td>${ro?esc(it.description):`<input class="cellinput" value="${esc(it.description)}" data-f="description">`}</td>
    <td>${ro?esc(it.room_tag||""):`<input class="cellinput" value="${esc(it.room_tag||"")}" data-f="room_tag" placeholder="—">`}</td>
    <td>${ro?esc(it.uom):`<input class="cellinput" value="${esc(it.uom)}" data-f="uom">`}</td>
    <td class="num">${ro?it.qty:`<input class="cellinput num" type="number" value="${it.qty}" data-f="qty">`}</td>
    <td class="num">${ro?fmt(it.rate):`<input class="cellinput num" type="number" value="${it.rate}" data-f="rate">`}</td>
    <td class="num" data-amt>${fmt(it.amount)}</td>
    ${canWrite()?`<td><button class="iconbtn" title="Delete">✕</button></td>`:""}`;
  if(!ro){
    tr.querySelectorAll(".cellinput").forEach(inp=>{
      inp.onchange=async()=>{
        const f=inp.dataset.f; const val=(f==="qty"||f==="rate")?Number(inp.value||0):inp.value;
        const {error}=await sb.from("boq_items").update({[f]:val}).eq("id",it.id);
        if(error)return toast(error.message);
        it[f]=val; it.amount=Number(it.qty)*Number(it.rate);
        tr.querySelector("[data-amt]").textContent=fmt(it.amount);
        refreshBoqTotal();
      };
    });
    tr.querySelector(".iconbtn").onclick=async()=>{
      if(!confirm("Delete this line?"))return;
      await sb.from("boq_items").delete().eq("id",it.id); loadSheet(activeBoq);
    };
  }
  return tr;
}

  $("#np_save").onclick=async()=>{

    const pmDir=$("#np_pm").value?Number($("#np_pm").value):null;
    const {data:proj,error}=await sb.from("projects").insert({
      code, name, client_name:name, client_phone:$("#np_phone").value.trim()||null,
      client_email:$("#np_email").value.trim()||null, property_type:$("#np_ptype").value,
      site_address:$("#np_site").value.trim()||null, contract_value:Number($("#np_val").value||0),
      status:$("#np_status").value, current_stage:"Briefing", converted_at:new Date().toISOString()
    }).select().single();

    // seed the 6 standard milestones
    await sb.from("project_milestones").insert(STAGE_FLOW.map((s,i)=>({project_id:proj.id,stage:s,sort_idx:i,status:"todo"})));
    closeModal(); toast(`Project ${code} created`);
    activeProject=proj.id; projectTab="overview"; renderProjectWorkspace(proj.id);
  };
}

const PROJ_TABS=[["overview","Overview"],["client","Client"],["boq","BOQ"],["payments","Payments"],["orders","Work Orders"],["design","Design"],["moodboard","Moodboard"],["canvas","Canvas"],["execution","Execution"],["documents","Documents"],["team","Team"]];

async function renderProjectWorkspace(pid){
  await ensureStaff();
  const m=$("#main");
  const {data:p,error}=await sb.from("projects").select("*").eq("id",pid).single();
  if(error||!p){ activeProject=null; return renderProjects(); }
  m.innerHTML=`
    <div class="pw-top">
      <button class="ghost" id="pwBack">← All projects</button>
      <div class="pw-title"><span class="mono pw-code">${esc(p.code||"")}</span>
        <h2 class="display">${esc(p.name)}</h2>
        <span class="pill ${p.status}">${p.status}</span></div>
      <div class="pw-val mono">${fmt(p.contract_value)}</div>
    </div>
    <nav class="pw-tabs" id="pwTabs">
      ${PROJ_TABS.map(t=>`<button data-t="${t[0]}" class="${projectTab===t[0]?"active":""}">${t[1]}</button>`).join("")}
    </nav>
    <div id="pwBody">Loading…</div>`;
  $("#pwBack").onclick=()=>{ if(typeof gStopAutosave==="function"){ if(G.dirty&&G.boqId)gSave(p,true); gStopAutosave(); } activeProject=null; renderProjects(); };
  $("#pwTabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    // leaving BOQ tab → flush + stop autosave
    if(projectTab==="boq" && b.dataset.t!=="boq" && typeof gStopAutosave==="function"){ if(G.dirty&&G.boqId)gSave(p,true); gStopAutosave(); }
    projectTab=b.dataset.t;
    $("#pwTabs").querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b));
    drawProjectTab(p);
  });
  drawProjectTab(p);
}

async function drawProjectTab(p){
  const body=$("#pwBody"); if(!body) return;
  if(projectTab==="overview")   return pwOverview(p,body);
  if(projectTab==="client")     return pwClient(p,body);
  if(projectTab==="boq")        return pwBoq(p,body);
  if(projectTab==="payments")   return pwPayments(p,body);
  if(projectTab==="orders")     return pwOrders(p,body);
  if(projectTab==="design")     return pwDesign(p,body);
  if(projectTab==="moodboard")  return pwMoodboard(p,body);
  if(projectTab==="canvas")     return pwCanvas(p,body);
  if(projectTab==="execution")  return pwExecution(p,body);
  if(projectTab==="documents")  return pwFiles(p,body,"document");
  if(projectTab==="team")       return pwTeam(p,body);
}

    box.innerHTML=`<div class="tl-empty">This project was created without a linked lead, so there's no carried-forward activity history.</div>`;
    return;
  }
  const {data:acts}=await sb.from("lead_activities").select("*").eq("lead_id",p.lead_id).order("created_at",{ascending:false});
  const w=canWrite();
  box.innerHTML=`
    ${w?`<div class="actadd">
      <select id="pact_type"><option value="Note">📝 Client note</option><option value="Call">📞 Call</option><option value="WhatsApp">💬 WhatsApp</option><option value="Meeting">🤝 Meeting</option><option value="Email">✉️ Email</option><option value="Site Visit">📍 Site visit</option><option value="Quote">📄 Quote</option></select>
      <input id="pact_text" placeholder="Log a project update, call, or client note…">
      <button class="primary" id="pact_add">Log</button></div>`:""}
    <div class="timeline">${(acts||[]).map(a=>{
        const icon={Note:"📝",Call:"📞",WhatsApp:"💬",Meeting:"🤝",Email:"✉️","Site Visit":"📍",Quote:"📄",created:"✨"}[a.type]||"•";
        const who=a.by_user?staffNameByProfile(a.by_user):"";
        const dt=new Date(a.created_at);
        const when=dt.toLocaleDateString("en-IN",{day:"2-digit",month:"short"})+" · "+dt.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
        return `<div class="tl-item2"><div class="tl-ic">${icon}</div>
          <div class="tl-main"><div class="tl-top"><span class="tl-type2">${esc(a.type)}</span><span class="tl-when2 mono">${when}</span></div>
          <div class="tl-text2">${esc(a.text||"")}</div>${who?`<div class="tl-who">— ${esc(who)}</div>`:""}</div></div>`;
      }).join("")||`<div class="tl-empty">No notes yet. The lead's history and all project updates will build here.</div>`}</div>`;
  if(w){

      const text=$("#pact_text").value.trim(); if(!text) return;
      const {error}=await sb.from("lead_activities").insert({lead_id:p.lead_id,type:$("#pact_type").value,text,by_user:me.id});
      if(error) return toast(error.message);
      renderProjectActivity(p);
    };
  }
}

async function pwOverview(p,body){
  await ensureStaff();
  const {data:ms}=await sb.from("project_milestones").select("*").eq("project_id",p.id).order("sort_idx");
  let stones=ms||[];
  // self-heal: if a project has no milestones yet, seed them client-side
  if(!stones.length){
    const seed=STAGE_FLOW.map((s,i)=>({project_id:p.id,stage:s,sort_idx:i,status:"todo"}));
    const {data:ins}=await sb.from("project_milestones").insert(seed).select();
    stones=ins||seed;
  }
  // ---- pull live signals from the other tabs ----
  const today=todayISO();
  const [{data:pays},{data:meets},{data:actions},{data:exacts}]=await Promise.all([
    sb.from("project_payments").select("amount").eq("project_id",p.id),
    sb.from("design_meetings").select("*").eq("project_id",p.id).neq("status","cancelled"),
    sb.from("mom_actions").select("*").eq("project_id",p.id).eq("status","open"),
    sb.from("project_activities").select("*").eq("project_id",p.id)
  ]);
  const received=(pays||[]).reduce((s,r)=>s+Number(r.amount||0),0);
  const invoiced=Number(p.invoiced_total)||Number(p.contract_value)||0;
  const pending=Math.max(invoiced-received,0);
  const paidPct=invoiced?Math.round(received/invoiced*100):0;
  const upMeets=(meets||[]).filter(m=>m.scheduled_at&&m.scheduled_at.slice(0,10)>=today).sort((a,b)=>a.scheduled_at.localeCompare(b.scheduled_at));
  const nextMeet=upMeets[0];
  const openActions=(actions||[]).sort((a,b)=>(a.deadline||"9999").localeCompare(b.deadline||"9999"));
  const overdueActions=openActions.filter(a=>a.deadline&&a.deadline<today).length;
  const lateActs=(exacts||[]).filter(a=>exStatus(a)==="late");

  const doneCount=stones.filter(s=>s.status==="done").length;
  const pct=Math.round(doneCount/stones.length*100);
  const curr=stones.find(s=>s.status==="in_progress")||stones.find(s=>s.status==="todo")||stones[stones.length-1];
  const team=[["Consultant",p.consultant_id],["Designer",p.designer_id],["PM",p.pm_id]].filter(x=>x[1]).map(x=>`${x[0]}: <b>${esc(staffName(x[1]))}</b>`).join(" · ")||"—";
  const ro=!canWrite();
  body.innerHTML=`
    <div class="cc-grid">
      <div class="cc ${pending>0?"":"good"}">
        <div class="ccl">Payment received</div>
        <div class="ccv mono">${fmt(received)}</div>
        <div class="ccs">${fmt(pending)} pending · ${paidPct}% collected</div>
        <div class="cc-bar"><div style="width:${paidPct}%"></div></div>
      </div>
      <div class="cc ${overdueActions>0?"alert":""}">
        <div class="ccl">Open action items</div>
        <div class="ccv">${openActions.length}</div>
        <div class="ccs">${overdueActions?overdueActions+" overdue":"none overdue"}</div>
      </div>
      <div class="cc">
        <div class="ccl">Next meeting</div>
        <div class="ccv" style="font-size:15px">${nextMeet?new Date(nextMeet.scheduled_at).toLocaleDateString("en-IN",{day:"2-digit",month:"short"}):"—"}</div>
        <div class="ccs">${nextMeet?esc(nextMeet.title):"none scheduled"}</div>
      </div>
      <div class="cc ${lateActs.length?"alert":""}">
        <div class="ccl">Execution</div>
        <div class="ccv">${lateActs.length?lateActs.length:"On track"}</div>
        <div class="ccs">${lateActs.length?"activities delayed":"no delays"}</div>
      </div>
    </div>
    <div class="ov-grid">
      <div class="ov-main">
        <div class="pw-card">
          <div class="ov-head"><div class="sec-label" style="border:none;padding:0">Project timeline</div>
            <div class="ov-prog"><div class="ov-bar"><div style="width:${pct}%"></div></div><span>${pct}% · ${doneCount}/${stones.length} stages</span></div></div>
          <div class="timeline2">
            ${stones.map(s=>{
              const cls=s.status==="done"?"done":s.status==="in_progress"?"prog":"todo";
              const ic=s.status==="done"?"✓":s.status==="in_progress"?"◐":"○";
              return `<div class="tl2 ${cls}">
                <div class="tl2-dot">${ic}</div>
                <div class="tl2-body">
                  <div class="tl2-top"><span class="tl2-name">${esc(s.stage)}</span>
                    ${ro?`<span class="tl2-stat">${s.status.replace("_"," ")}</span>`:`<select data-ms="${s.id}" class="tl2-sel">
                      <option value="todo" ${s.status==="todo"?"selected":""}>To-do</option>
                      <option value="in_progress" ${s.status==="in_progress"?"selected":""}>In progress</option>
                      <option value="done" ${s.status==="done"?"selected":""}>Done</option></select>`}
                  </div>
                  <div class="tl2-meta">
                    ${s.done_date?`Completed ${dShort(s.done_date)}`:s.target_date?`Target ${dShort(s.target_date)}`:`<span style="color:var(--ink-soft)">No date set</span>`}
                    ${ro?"":`<input type="date" class="tl2-date" data-msd="${s.id}" value="${s.target_date||''}" title="Target date">`}
                  </div>
                </div></div>`;
            }).join("")}
          </div>
        </div>
        <div class="pw-card">
          <div class="sec-label" style="border:none;padding:0">Activity & client notes</div>
          <div id="pjAct" style="margin-top:10px">Loading…</div>
        </div>
      </div>
      <div class="ov-side">
        <div class="pw-card">
          <div class="sec-label" style="border:none;padding:0">Action items due</div>
          ${openActions.length?`<div class="mini-list">${openActions.slice(0,5).map(a=>{
            const over=a.deadline&&a.deadline<today;
            return `<div class="mini-item">${a.assignee_id?`<span class="av" title="${esc(staffName(a.assignee_id))}">${initials(staffName(a.assignee_id))}</span>`:"•"}
              <span>${esc(a.item)}</span>
              <span class="mi-due ${over?"over":""}">${dShort(a.deadline)}</span></div>`;
          }).join("")}</div>${openActions.length>5?`<button class="linkbtn" data-go="design" style="margin-top:8px">+${openActions.length-5} more in MoM →</button>`:""}`
          :`<div style="font-size:13px;color:var(--ink-soft)">No open action items.</div>`}
        </div>
        <div class="pw-card">
          <div class="sec-label" style="border:none;padding:0">Upcoming meetings</div>
          ${upMeets.length?`<div class="mini-list">${upMeets.slice(0,4).map(m=>`
            <div class="mini-item">📅 <span>${esc(m.title)}</span>
              <span class="mi-due">${new Date(m.scheduled_at).toLocaleDateString("en-IN",{day:"2-digit",month:"short"})}</span></div>`).join("")}</div>`
          :`<div style="font-size:13px;color:var(--ink-soft)">No meetings scheduled.</div>`}
          <button class="linkbtn" data-go="design" style="margin-top:8px">Open Design → Meetings</button>
        </div>
        <div class="pw-card">
          <div class="sec-label" style="border:none;padding:0">Snapshot</div>
          <div class="ov-stat"><span>Stage</span><b>${esc(curr?curr.stage:"—")}</b></div>
          <div class="ov-stat"><span>Status</span><b>${esc(p.status||"active")}</b></div>
          <div class="ov-stat"><span>Contract value</span><b class="mono">${fmt(p.contract_value)}</b></div>
          <div class="ov-stat"><span>Code</span><b class="mono">${esc(p.code||"—")}</b></div>
        </div>
        <div class="pw-card">
          <div class="sec-label" style="border:none;padding:0">Team</div>
          <div style="font-size:13px;line-height:1.9">${team}</div>
          <button class="ghost" id="ovTeam" style="margin-top:10px">Manage team →</button>
        </div>
        <div class="pw-card">
          <div class="sec-label" style="border:none;padding:0">Quick links</div>
          <div class="ov-links">
            <button class="linkbtn" data-go="boq">Open Project BOQ →</button>
            <button class="linkbtn" data-go="payments">Payments →</button>
            <button class="linkbtn" data-go="execution">Execution schedule →</button>
            <button class="linkbtn" data-go="design">Design & meetings →</button>
          </div>
        </div>
      </div>
    </div>`;
  // wire quick links + team
  body.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{ projectTab=b.dataset.go; renderProjectWorkspace(p.id); });
  if($("#ovTeam")) $("#ovTeam").onclick=()=>{ projectTab="team"; renderProjectWorkspace(p.id); };
  renderProjectActivity(p);
  if(!ro){
    body.querySelectorAll(".tl2-sel").forEach(sel=>sel.onchange=async()=>{
      const status=sel.value, id=sel.dataset.ms;
      const patch={status,updated_at:new Date().toISOString()};
      if(status==="done") patch.done_date=new Date().toISOString().slice(0,10);
      await sb.from("project_milestones").update(patch).eq("id",id);
      // set project.current_stage to the first non-done stage
      const fresh=(await sb.from("project_milestones").select("*").eq("project_id",p.id).order("sort_idx")).data||[];
      const cur=fresh.find(s=>s.status!=="done"); 
      await sb.from("projects").update({current_stage:cur?cur.stage:"Handover"}).eq("id",p.id);
      pwOverview(p,body);
    });
    body.querySelectorAll(".tl2-date").forEach(inp=>inp.onchange=async()=>{
      await sb.from("project_milestones").update({target_date:inp.value||null}).eq("id",inp.dataset.msd);
      toast("Date saved");
    });
  }
}

async function pwPayments(p,body){
  const {data:pays}=await sb.from("project_payments").select("*").eq("project_id",p.id).order("paid_on",{ascending:false});
  const {data:miles}=await sb.from("payment_milestones").select("*").eq("project_id",p.id).order("sort_idx").order("id");
  const list=pays||[];
  const mlist=miles||[];
  const received=list.reduce((s,r)=>s+Number(r.amount||0),0);
  const invoiced=Number(p.invoiced_total)||Number(p.contract_value)||0;
  const balance=invoiced-received;
  const pctPaid=invoiced?Math.round(received/invoiced*100):0;
  const ro=!canWrite();
  body.innerHTML=`

      <div class="wcell"><div class="wl">Paid</div><div class="wv">${pctPaid}%</div><div class="ov-bar" style="margin-top:8px"><div style="width:${Math.min(100,pctPaid)}%"></div></div></div>

    <div class="pw-card">

      ${mlist.length?`<table><thead><tr><th>Milestone</th><th class="num">%</th><th class="num">Amount</th><th>Status</th><th>PI</th>${ro?'':'<th></th>'}</tr></thead><tbody>
        ${mlist.map(m=>`<tr>
          <td>${esc(m.label)}</td>

          <td class="num mono">${fmt(m.amount)}</td>
          <td>${m.status==='paid'?'<span class="ex-st done">Paid</span>':m.status==='link_sent'?'<span class="ex-st in_progress">Link sent</span>':'<span class="ex-st todo">Pending</span>'}</td>

          </td>`}

/* ---- Milestone schedule setup ---- */
function milestoneSetup(p, existing){
  const contractVal=Number(p.contract_value)||0;
  // a milestone with an issued PI, a payment link, or any payment progress is immutable
  const isLocked=m=>!!(m.pi_number||m.razorpay_link||(m.status&&m.status!=='pending'));
  const stripPct=s=>(s||'').replace(/\s*\(\d+(\.\d+)?%\)$/,'');
  const def=existing.length?existing.map(m=>({...m,label:stripPct(m.label)})):[
    {label:"Advance",percent:10},
    {label:"On design sign-off",percent:40},
    {label:"On material procurement",percent:30},
    {label:"On handover",percent:20}
  ];
  const rowHtml=(m,i)=>{
    const lk=m.id&&isLocked(m);
    return `<div class="mom-action-edit" data-mrow="${i}"${m.id?` data-msid="${m.id}"`:''}${lk?' data-locked="1"':''}>
    <input class="ms-label" placeholder="Milestone" value="${esc(m.label||'')}"${lk?' disabled':''}>
    <input class="ms-pct" type="number" placeholder="%" value="${m.percent||0}" style="width:80px"${lk?' disabled':''}>
    <span class="ms-amt mono" style="font-size:12px;color:var(--ink-soft)">${fmt(lk?(Number(m.amount)||0):Math.round(contractVal*(m.percent||0)/100))}</span>
    ${lk?`<span style="font-size:11px;color:var(--ink-soft);white-space:nowrap" title="Locked — this milestone has an issued PI, a payment link, or a payment">🔒 ${m.status==='paid'?'Paid':m.pi_number?esc(m.pi_number):'Link created'}</span>`
        :`<button class="linkbtn del" onclick="this.parentElement.remove();window._recalcMile&&window._recalcMile()">×</button>`}
  </div>`;};
  openModal(`
    <div class="modal-h">Payment schedule</div>
    <div class="modal-b">
      <div class="banner">Contract value: <b>${fmt(contractVal)}</b>. Percentages should add up to 100%.</div>
      <div id="ms-rows">${def.map((m,i)=>rowHtml(m,i)).join("")}</div>
      <button class="ghost" id="ms-add" style="margin-top:6px">+ Add milestone</button>
      <div id="ms-total" style="margin-top:10px;font-size:13px"></div>
    </div>
    <div class="modal-f"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" id="ms-save">Save schedule</button></div>`);
  const recalc=()=>{
    let totPct=0;
    document.querySelectorAll("#ms-rows .mom-action-edit").forEach(r=>{
      const pct=Number(r.querySelector(".ms-pct").value)||0; totPct+=pct;
      if(r.dataset.locked!=="1") r.querySelector(".ms-amt").textContent=fmt(Math.round(contractVal*pct/100));
    });
    const el=$("#ms-total");
    el.innerHTML=`Total: <b style="color:${totPct===100?'var(--green)':'var(--clay)'}">${totPct}%</b>${totPct!==100?' — should be 100%':' ✓'}`;
  };
  window._recalcMile=recalc;
  $("#ms-rows").addEventListener("input",recalc);
  $("#ms-add").onclick=()=>{ $("#ms-rows").insertAdjacentHTML("beforeend",rowHtml({label:"",percent:0},Date.now())); recalc(); };
  recalc();
  $("#ms-save").onclick=async()=>{
    const btn=$("#ms-save"); if(btn.disabled) return; btn.disabled=true;
    try{
      const rows=Array.from(document.querySelectorAll("#ms-rows .mom-action-edit")).map((r,i)=>({
        id:r.dataset.msid?Number(r.dataset.msid):null,
        locked:r.dataset.locked==="1",
        label:r.querySelector(".ms-label").value.trim(),
        percent:Number(r.querySelector(".ms-pct").value)||0,
        idx:i
      })).filter(x=>x.locked||(x.label&&x.percent));
      if(!rows.length){ toast("Add at least one milestone"); return; }
      // rounded amounts; when % total is exactly 100, the last editable row absorbs
      // the rounding remainder so the schedule sums to the contract value to the rupee
      const totPct=rows.reduce((s,r)=>s+r.percent,0);
      const amounts=rows.map(r=>Math.round(contractVal*r.percent/100));
      if(totPct===100){
        const li=rows.map(r=>r.locked).lastIndexOf(false);
        if(li>=0) amounts[li]=contractVal-amounts.reduce((s,a,j)=>j===li?s:s+a,0);
      }
      // diff against fresh DB state — never delete or rewrite a milestone that carries
      // an issued PI, a payment link, or payment progress (even if it got one since the modal opened)
      const {data:freshAll,error:fErr}=await sb.from("payment_milestones").select("id,pi_number,razorpay_link,status").eq("project_id",p.id);
      if(fErr){ toast(fErr.message); return; }
      const keptIds=new Set(rows.filter(r=>r.id).map(r=>r.id));
      const lockedNow=new Set((freshAll||[]).filter(m=>isLocked(m)).map(m=>m.id));
      const toDelete=(freshAll||[]).filter(m=>!keptIds.has(m.id)&&!lockedNow.has(m.id)).map(m=>m.id);
      for(let j=0;j<rows.length;j++){
        const r=rows[j];
        if(r.id&&(r.locked||lockedNow.has(r.id))){
          const {error}=await sb.from("payment_milestones").update({sort_idx:r.idx}).eq("id",r.id);
          if(error){ toast(error.message); return; }
        }else if(r.id){
          const {error}=await sb.from("payment_milestones").update({label:`${r.label} (${r.percent}%)`,percent:r.percent,amount:amounts[j],sort_idx:r.idx}).eq("id",r.id);
          if(error){ toast(error.message); return; }
        }else{
          const {error}=await sb.from("payment_milestones").insert({project_id:p.id,label:`${r.label} (${r.percent}%)`,percent:r.percent,amount:amounts[j],sort_idx:r.idx,status:"pending"});
          if(error){ toast(error.message); return; }
        }
      }
      if(toDelete.length){
        const {error}=await sb.from("payment_milestones").delete().in("id",toDelete);
        if(error){ toast(error.message); return; }
      }
      closeModal(); toast("Schedule saved"); pwPayments(p,$("#pwBody"));
    }finally{ btn.disabled=false; }
  };
}

const PRIYA_SERVER="https://lintel-crm-production.up.railway.app";
/* Tell Priya the moment a lead is assigned → instant WhatsApp to the owner.
   Failures are surfaced (previously swallowed) so a dropped assignment alert is visible. */
function pingAssignment(payload){
  try{
    fetch(PRIYA_SERVER+"/notify/assignment",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .then(r=>{ if(!r.ok) toast("Assignment alert may not have reached the team (server "+r.status+")"); })
      .catch(()=>toast("Assignment alert didn't reach the team — check your connection"));
  }catch(_){ toast("Assignment alert failed to send"); }
}
async function createRazorpayLink(p, milestone){
  // if already exists, just copy it
  if(milestone.razorpay_link){
    navigator.clipboard?.writeText(milestone.razorpay_link);
    toast("Payment link copied");
    if(p.client_phone){
      const msg=`Dear ${p.client_name||'Client'},\n\nPayment link for ${milestone.label}:\n${milestone.razorpay_link}\n\nAmount: ₹${Number(milestone.amount).toLocaleString('en-IN')}\n\n— Team Lintel`;
      if(confirm("Send this link to the client on WhatsApp?")) waOpen(p.client_phone,msg);
    }
    return;
  }
  if(createRazorpayLink._busy) return;
  createRazorpayLink._busy=true;
  toast("Creating payment link…");
  // ensure a PI number exists for reference
  let boqRef=`BOQ/${p.code||'LSA'}`;
  try{
    const r=await fetch(PRIYA_SERVER+"/payment/create-link",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        milestoneId:milestone.id, projectId:p.id, amount:milestone.amount,
        label:milestone.label, piNumber:milestone.pi_number||"",
        clientName:p.client_name||p.name, clientPhone:p.client_phone, clientEmail:p.client_email,
        boqRef:boqRef
      })
    });
    const data=await r.json();
    if(data.error){ toast("Razorpay: "+data.error); return; }
    if(data.short_url){
      // persist the link ourselves — don't rely on the payment server writing it back
      const {error:uErr}=await sb.from("payment_milestones").update({razorpay_link:data.short_url,status:"link_sent"}).eq("id",milestone.id);
      if(uErr) toast("Link created but not saved to milestone: "+uErr.message);
      milestone.razorpay_link=data.short_url; milestone.status="link_sent";
      toast("Payment link created");
      navigator.clipboard?.writeText(data.short_url);
      pwPayments(p,$("#pwBody"));
      if(p.client_phone){
        const msg=`Dear ${p.client_name||'Client'},\n\nPayment link for ${milestone.label}:\n${data.short_url}\n\nAmount: ₹${Number(milestone.amount).toLocaleString('en-IN')}\n\n— Team Lintel`;
        if(confirm("Link copied. Send to client on WhatsApp now?")) waOpen(p.client_phone,msg);
      }
    }
  }catch(e){ toast("Could not reach payment server"); }
  finally{ createRazorpayLink._busy=false; }
}

/* ---- Generate / view Proforma Invoice ---- */
async function generateProforma(p, milestone){
  if(generateProforma._busy) return;
  generateProforma._busy=true;
  try{
    // get latest BOQ for ref
    const {data:bv}=await sb.from("boq_versions").select("version,version_label").eq("project_id",p.id).order("version",{ascending:false}).order("id",{ascending:false}).limit(1);
    const boqRef=`BOQ/${p.code||'LSA'}${bv&&bv[0]?'/v'+bv[0].version:''}`;
    let piNumber=milestone.pi_number;
    // generate PI number if not already set — counter increments atomically server-side
    if(!piNumber){
      const {data:next,error:cErr}=await sb.rpc("next_pi_counter",{p_project_id:p.id});
      if(cErr||!next){ toast("Could not reserve a PI number"+(cErr?": "+cErr.message:"")); return; }
      // fallback prefix includes the project id — pi_counter is per-project, so a shared
      // fallback would collide across code-less projects on the global unique index
      piNumber=`${p.code||('LSA-P'+p.id)}/PI-${next}`;
      // insert the PI record first; only a successfully recorded PI gets stamped on the milestone
      const {error:iErr}=await sb.from("proforma_invoices").insert({
        project_id:p.id, milestone_id:milestone.id, pi_number:piNumber, boq_ref:boqRef,
        amount:milestone.amount, remark:`Refer to final ${boqRef} shared for details.`,
        client_name:p.client_name||p.name, client_phone:p.client_phone, client_email:p.client_email, created_by:me.id
      });
      if(iErr){ toast("PI record failed: "+iErr.message); return; }
      const {error:mErr}=await sb.from("payment_milestones").update({pi_number:piNumber,status:milestone.status==='pending'?'link_sent':milestone.status}).eq("id",milestone.id);
      if(mErr){ toast("PI "+piNumber+" recorded but not stamped on the milestone: "+mErr.message); return; }
      milestone.pi_number=piNumber;
    }
    showProformaDoc(p, milestone, piNumber, boqRef);
  }finally{ generateProforma._busy=false; }
}

async function generatePOs(p,body){
  // load the project's latest BOQ + its items
  const {data:vers}=await sb.from("boq_versions").select("*").eq("project_id",p.id).order("version",{ascending:false}).order("id",{ascending:false}).limit(1);
  if(!vers||!vers.length) return toast("No BOQ on this project yet — build one first");
  const ver=vers[0];
  const {data:items}=await sb.from("boq_items").select("*").eq("boq_version_id",ver.id).order("sort_idx");
  if(!items||!items.length) return toast("The BOQ has no line items");
  // per-section boost from stream_settings (legacy boost_pct retired by BOQ-STREAMS-02)
  const ssAll=ver.stream_settings||{};
  const boostFor=st=>Number((ssAll[normStream(st)]||{}).boost)||0;
  // group by category (A2: excluded/optional lines are outside contracted scope — never in work orders)
  const inScope=items.filter(r=>r.scope!=='excluded'&&r.scope!=='optional');
  if(!inScope.length) return toast("The BOQ has no included line items");
  const cats={};
  inScope.forEach(r=>{ const c=r.category||"Uncategorised"; (cats[c]=cats[c]||[]).push(r); });
  const catNames=Object.keys(cats);
  openModal(`
    <div class="modal-h">Generate work orders</div>
    <div class="modal-b">
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:12px">One work order will be created per selected scope from BOQ <b>${esc(ver.version_label||('v'+ver.version))}</b>. Assign people and dates after creating.</div>
      <div class="field"><label>Value basis</label>
        <select id="po_basis">
          <option value="client">Project value (client-facing, per-section boost applied)</option>
          <option value="internal">Internal cost (before boost)</option>
        </select>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:4px">Internal tracking — project value is the usual choice.</div>
      </div>
      <div class="sec-label" style="border:none">Scopes (categories)</div>
      <div class="tagpick" id="po_cats">${catNames.map(c=>`<span class="tgopt on" data-c="${esc(c)}">${esc(c)} <span style="opacity:.6">(${cats[c].length})</span></span>`).join("")}</div>
    </div>
    <div class="modal-f"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" id="po_go">Create work orders</button></div>`);
  const picked=new Set(catNames);
  $("#po_cats").querySelectorAll(".tgopt").forEach(el=>el.onclick=()=>{ const c=el.dataset.c; if(picked.has(c)){picked.delete(c);el.classList.remove("on");}else{picked.add(c);el.classList.add("on");} });
  $("#po_go").onclick=async()=>{
    const btn=$("#po_go"); if(btn.disabled) return; btn.disabled=true;
    try{
      const basis=$("#po_basis").value;
      const sel=[...picked]; if(!sel.length){ toast("Pick at least one scope"); return; }
      // WO numbers come from a server-side sequence — race-safe, year not hardcoded
      const {data:nums,error:nErr}=await sb.rpc("next_wo_numbers",{p_n:sel.length});
      if(nErr||!nums||nums.length!==sel.length){ toast("Could not reserve WO numbers"+(nErr?": "+nErr.message:"")); return; }
      const rows=[];
      sel.forEach((cat,k)=>{
        const its=cats[cat].map(r=>{
          const baseRate=Number(r.rate)||0;
          const rate=basis==="client"?Math.round(baseRate*(1+boostFor(r.stream)/100)):baseRate;
          const qty=Number(r.qty)||0;
          return {room:r.room||"",item:r.item_name||r.description||"",unit:r.uom||"",qty,rate,amount:Math.round(rate*qty)};
        });
        const subtotal=its.reduce((s,x)=>s+x.amount,0);
        rows.push({ project_id:p.id, boq_version_id:ver.id, po_number:nums[k],
          category:cat, rate_basis:basis, status:"draft", items:its, subtotal, created_by:me.id });
      });
      const {error}=await sb.from("purchase_orders").insert(rows);
      if(error){ toast(error.message); return; }
      closeModal(); toast(`${rows.length} work order(s) created`); pwOrders(p,body);
    }finally{ btn.disabled=false; }
  };
}

function gcalUrl(mt){
  const start=mt.scheduled_at?new Date(mt.scheduled_at):new Date();
  const end=new Date(start.getTime()+(mt.duration_min||30)*60000);
  const fmtG=d=>d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const params=new URLSearchParams({
    action:"TEMPLATE", text:mt.title||"Design meeting",
    dates:`${fmtG(start)}/${fmtG(end)}`,
    details:(mt.agenda||"")+"\n\nScheduled via Lintel OS. Click 'Add Google Meet video conferencing' before saving.",
    add:mt.client_email||""
  });
  return "https://calendar.google.com/calendar/render?"+params.toString();
}

/* ---- Google Calendar sync (edge function: google-calendar) ----
   Per-user OAuth: each staff member connects their own Google account once.
   Events are created on the connecting user's primary calendar with an
   auto-generated Meet link; the client email is invited as a guest. */
const GCAL_FN = SUPABASE_URL + "/functions/v1/google-calendar";
let gcalConn = { checked:false, connected:false, email:"" };
async function gcalFetch(path, payload){
  const {data:{session}} = await sb.auth.getSession();
  if(!session) throw new Error("Not signed in");
  const r = await fetch(GCAL_FN+path,{
    method: payload?"POST":"GET",
    headers:{ "Content-Type":"application/json", Authorization:"Bearer "+session.access_token },
    body: payload?JSON.stringify(payload):undefined
  });
  let d={}; try{ d=await r.json(); }catch(e){}
  if(!r.ok) throw new Error(d.error||("Calendar service error ("+r.status+")"));
  return d;
}
async function gcalStatus(force){
  if(gcalConn.checked && !force) return gcalConn;
  try{
    const {data}=await sb.from("google_calendar_accounts").select("google_email,connected_at").eq("user_id",me.id).maybeSingle();
    gcalConn={checked:true,connected:!!data,email:data?.google_email||""};
  }catch(e){ gcalConn={checked:true,connected:false,email:""}; }
  return gcalConn;
}
function gcalBarHtml(){
  if(!gcalConn.checked) return "";
  return gcalConn.connected
    ? `<div class="dm-sub" style="margin:0 0 12px">📆 Google Calendar connected as <b>${esc(gcalConn.email||"your Google account")}</b> — saved meetings can create a real event + Meet link. <button class="linkbtn" data-gc-disc>Disconnect</button></div>`
    : `<div class="banner" style="margin:0 0 12px">Connect Google Calendar to create events + Meet links straight from Lintel OS — no more copy-pasting links. <button class="ghost" data-gc-conn style="margin-left:8px">🔗 Connect Google Calendar</button></div>`;
}
function bindGcalBar(body, rerender){
  body.querySelectorAll("[data-gc-conn]").forEach(b=>b.onclick=()=>gcalConnect(rerender));
  body.querySelectorAll("[data-gc-disc]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Disconnect Google Calendar? Existing events stay on your calendar, but Lintel OS can no longer update or cancel them.")) return;
    try{ await gcalFetch("/disconnect",{}); }catch(e){ return toast(e.message); }
    await gcalStatus(true); toast("Google Calendar disconnected"); rerender();
  });
}
async function gcalConnect(rerender){
  let d;
  try{ d=await gcalFetch("/auth-url"); }
  catch(e){ return toast(e.message); }
  const pop=window.open(d.url,"gcal_auth","width=520,height=660");
  if(!pop) return toast("Popup blocked — allow popups for this site and try again");
  const done=async()=>{
    await gcalStatus(true);
    if(gcalConn.connected){ toast("Google Calendar connected"); rerender&&rerender(); }
  };
  const onMsg=ev=>{ if(ev.data&&ev.data.type==="gcal-connected"){ window.removeEventListener("message",onMsg); done(); } };
  window.addEventListener("message",onMsg);
  const iv=setInterval(()=>{ if(pop.closed){ clearInterval(iv); window.removeEventListener("message",onMsg); if(!gcalConn.connected) done(); } },1200);
}
async function gcalSyncMeeting(id){
  toast("Creating Google Calendar event…");
  const d=await gcalFetch("/create-event",{meeting_id:Number(id)});
  toast(d.meet_link?"Calendar event + Meet link created — invite sent":"Calendar event created");
  return d;
}
function meetEditModal(mt, rerender){

  const when=mt.scheduled_at?toLocal(new Date(mt.scheduled_at)):"";
  openModal(`<div class="modal-h">Edit meeting</div>
    <div class="modal-b">

      <div class="field"><label>Status</label><select id="me_status">${["scheduled","done","cancelled"].map(s=>`<option ${(mt.status||"scheduled")===s?"selected":""}>${s}</option>`).join("")}</select></div>
      ${mt.gcal_event_id?`<div class="dm-sub">📆 Linked to Google Calendar — saving pushes the changes to the event and notifies guests.</div>`:""}
    </div>

      catch(e){ toast("Saved in Lintel OS, but Google Calendar update failed: "+e.message); }

async function meetDelete(id, rerender){
  const {data:mt}=await sb.from("design_meetings").select("id,gcal_event_id").eq("id",id).single();
  if(!confirm(mt&&mt.gcal_event_id?"Remove this meeting? The Google Calendar event will be cancelled and guests notified.":"Remove this meeting?")) return;

    try{ await gcalFetch("/delete-event",{meeting_id:Number(id)}); }

/* ---- Minutes of Meeting (unified: works for project + lead) ---- */
async function dsMoM(p,body){
  return renderMoM("project", p, body);
}

/* entityType: "project" | "lead" — entity needs .id (+code/name for project, .name for lead) */
async function renderMoM(entityType, entity, body){
  const w=canWrite();
  const idCol = entityType==="project" ? "project_id" : "lead_id";
  const {data:moms}=await sb.from("design_moms").select("*").eq(idCol,entity.id).order("created_at",{ascending:false});
  const {data:meets}=await sb.from("design_meetings").select("id,title").eq(idCol,entity.id);
  const {data:actions}=await sb.from("mom_actions").select("*").eq(idCol,entity.id);
  const meetName=id=>{const m=(meets||[]).find(x=>x.id===id);return m?m.title:"";};
  body.innerHTML=`
  ${w?`<div style="margin-bottom:14px"><button class="primary" id="mom_new">📝 Record minutes now</button></div>`:""}
  <div id="mom_list">${(moms||[]).map(m=>{
    const acts=(actions||[]).filter(a=>a.mom_id===m.id);
    return `<div class="mom-card">
      <div class="mom-h">
        <div><div class="mt">${esc(m.title||"Minutes of meeting")}</div>
          ${m.meeting_id?`<div class="mw">↳ ${esc(meetName(m.meeting_id))}</div>`:""}
          ${m.attendees?`<div class="mw">👥 ${esc(m.attendees)}</div>`:""}</div>
        <div class="mw">${new Date(m.created_at).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"})}
          ${w?` · <button class="linkbtn" data-momedit="${m.id}">edit</button> · <button class="linkbtn del" data-momdel="${m.id}">✕</button>`:""}</div>
      </div>
      ${m.summary?`<div class="mom-sum">${esc(m.summary)}</div>`:""}
      ${acts.length?`<div class="sec-label" style="font-size:11px">Action items</div>${acts.map(a=>{
        const over=a.deadline&&a.deadline<todayISO()&&a.status!=="done";
        return `<div class="act-item ${a.status==="done"?"done":""}">
          ${w?`<input type="checkbox" data-actdone="${a.id}" ${a.status==="done"?"checked":""}>`:""}
          <span class="ai-txt">${esc(a.item)}</span>
          ${a.assignee_id?`<span class="av" title="${esc(staffName(a.assignee_id))}">${initials(staffName(a.assignee_id))}</span>`:a.assignee_text?`<span class="av" title="${esc(a.assignee_text)}">${initials(a.assignee_text)}</span>`:""}
          ${a.deadline?`<span class="ai-due ${over?"over":""}">${a.deadline}</span>`:""}
        </div>`;}).join("")}`:``}
      <div class="mom-share" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="ghost" data-mompdf="${m.id}">⬇ Download PDF</button>
        <button class="ghost" data-momwa="${m.id}">Share on WhatsApp</button>
        <button class="ghost" data-mommail="${m.id}">Share via Email</button>
      </div>
    </div>`;
  }).join("")||emptyState("No minutes yet", w?"Tap Record minutes now — during or right after a call.":"Nothing recorded yet.")}</div>`;

  body.querySelectorAll("[data-mompdf]").forEach(b=>b.onclick=()=>momExport(entityType,entity,b.dataset.mompdf,moms,actions,"pdf"));
  body.querySelectorAll("[data-momwa]").forEach(b=>b.onclick=()=>momExport(entityType,entity,b.dataset.momwa,moms,actions,"wa"));
  body.querySelectorAll("[data-mommail]").forEach(b=>b.onclick=()=>momExport(entityType,entity,b.dataset.mommail,moms,actions,"email"));

  if(w){
    $("#mom_new").onclick=()=>momForm(entityType,entity,{},body);
    body.querySelectorAll("[data-momdel]").forEach(b=>b.onclick=async()=>{
      if(!confirm("Delete this MoM and its action items?")) return;
      await sb.from("design_moms").delete().eq("id",b.dataset.momdel); renderMoM(entityType,entity,body);
    });
    body.querySelectorAll("[data-momedit]").forEach(b=>b.onclick=async()=>{
      const {data:m}=await sb.from("design_moms").select("*").eq("id",b.dataset.momedit).single();
      const {data:acts}=await sb.from("mom_actions").select("*").eq("mom_id",b.dataset.momedit);
      momForm(entityType,entity,m,body,acts||[]);
    });

    });
